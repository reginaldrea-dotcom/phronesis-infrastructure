project_id = "vysenpymsfhgionqfulf"

# api-prime-invoke is called by the Prime interfaces without a JWT (anon, no auth
# header). It MUST deploy with verify_jwt disabled or the interface breaks.
[functions.api-prime-invoke]
verify_jwt = false

# theo-dispatch-worker is invoked by pg_cron (service-to-service), which presents
# a secret key in the `apikey` header. The new Supabase API keys are not JWTs and
# cannot pass the verify_jwt gate, so per Supabase guidance verify_jwt is disabled
# and the worker validates the caller itself (see functions/theo-dispatch-worker/
# lib/auth.ts). MUST deploy with --no-verify-jwt.
[functions.theo-dispatch-worker]
verify_jwt = false

# grounding-worker is the cron-ticked drainer of grounding_queue. Like theo-dispatch-worker it is
# platform-ungated (verify_jwt=false) and self-guards via the apikey secret (WORKER_INVOKE_KEY). It calls
# api-prime-invoke per claim to keep Angelia's judgment in the loop. MUST deploy with --no-verify-jwt.
[functions.grounding-worker]
verify_jwt = false

# live-report is the recompute endpoint for the live AESSEAL report. Like
# theo-render-data it is Cloudflare-gated and UUID-addressed (session_id is the
# capability), called from the surface with the publishable key and no JWT, so
# verify_jwt is disabled. MUST deploy with --no-verify-jwt.
[functions.live-report]
verify_jwt = false

# research-feed is the multi-research awareness poll endpoint (the knocker-upper seed).
# Cloudflare-gated, called from the surface with the publishable key and no JWT; reads
# theo_session/engine_dispatch with the service-role credential. MUST deploy with --no-verify-jwt.
[functions.research-feed]
verify_jwt = false

# relay-iti-promote is the Navigator board's promote-to-top write (Fix 5): templates a baton's
# ITI and upserts relay_iti (service-write only). Cloudflare-gated, called from the board with
# the publishable key and no JWT. MUST deploy with --no-verify-jwt.
[functions.relay-iti-promote]
verify_jwt = false

# dossier-interrogate is the reader-facing ASK side of the Dossier surface (interrogate surface v2,
# Napoleon baton 629e4723). Public/token-gated at the surface (share-viewer), UUID-addressed
# (theo_session_id is the capability); mints a fresh ephemeral interrogate seal, drives api-prime-invoke,
# and returns the trace_interrogation-vetted answer. Called from the surface with the publishable key and
# no JWT. MUST deploy with --no-verify-jwt.
[functions.dossier-interrogate]
verify_jwt = false

# dossier-interrogate-status is the REAL-progress poll for the ASK panel (baton 39ea928f, item 1). Given a
# progress_id (the interrogation session id), it derives the current stage (reading/drafting/checked) + the
# real kept/withheld counts from execution_ledger + interrogation_run, so the surface shows genuine stage
# state during the ~45s wait instead of a dead screen (no faked progress). Public/token-gated at the surface,
# reads with the service credential. MUST deploy with --no-verify-jwt.
[functions.dossier-interrogate-status]
verify_jwt = false

# interrogate-precompute warms the interrogate cache over a Dossier's KNOWN questions (research_question) so
# suggested questions serve instantly (baton 39ea928f, item 3). Bounded + resumable (drives dossier-interrogate
# per question, up to `limit` uncached-at-current-graph_version per call). UUID-addressed (theo_session_id);
# once warm, repeated calls are cheap (all skipped). MUST deploy with --no-verify-jwt.
[functions.interrogate-precompute]
verify_jwt = false

# dossier-interrogate-chips returns the suggested-question chips for the ASK panel (Eames ruling 11b073fb /
# SP a1938393). Eligibility comes from the TRACE (a question is offered iff its cached trace returned >=1 kept
# claim — grounding true by construction, not from research_question.status), plus a gap_count of known
# questions with no grounded answer (a finding, surfaced quietly). UUID-addressed; MUST deploy with
# --no-verify-jwt.
[functions.dossier-interrogate-chips]
verify_jwt = false

# dossier-curate-accept is the OPERATOR CURATION accept-write (baton 53897bcc; Aegis 450a3ab4). An operator
# accepts a withheld ungrounded_claim on their own knowledge -> an operator_curation_log 'add'. Authenticated
# by the EDITOR ROLE on the share token, resolved + enforced SERVER-SIDE (general scope requires is_editor;
# curator = the resolved identity_key, never a constant). Only a real ungrounded_claim in the Dossier is
# acceptable. verify_jwt=false (the token is the capability). MUST deploy with --no-verify-jwt.
[functions.dossier-curate-accept]
verify_jwt = false

# dossier-curate-link is the supporting-link accept/reject write (Theo b63ec6d5). INTERIM model "B"
# (Reg, 7 Jul 2026): Cloudflare-edge-trusted, UUID-addressed (section_id), called from the internal
# dossier page with the publishable key and no JWT; writes synthesis_section.support_links with the
# service-role credential. Buttons are suppressed on the external token share. MUST deploy with
# --no-verify-jwt. HARDENING (Aegis): move to a same-origin Access-verified proxy for provable Reg-only.
[functions.dossier-curate-link]
verify_jwt = false

# navigator-action-annotate is the Notices action-surface write path (Napoleon 290853ae):
# Reg's annotation layer (title/note/snooze/soft-supersede) over the derived action lines,
# written with the service-role credential into Connie's action_line_annotation. Cloudflare-gated
# surface, called with the publishable key and no JWT. MUST deploy with --no-verify-jwt.
[functions.navigator-action-annotate]
verify_jwt = false

# link-verification-pass is C11 (Napoleon 03df2aae): the cheap point-in-time verification of
# every engine-returned link. UUID-addressed (theo_session_id is the capability), bounded +
# resumable, service-role writes to link_verification. MUST deploy with --no-verify-jwt.
[functions.link-verification-pass]
verify_jwt = false

# dossier-review-edge is the evidence-review verdict write (Eames 57480e66): an editor confirms/rejects
# "does this source support this claim?" per EDGE. Editor-token gated server-side, writes review_state to
# element_dependency (RLS deny-all) with the service-role credential. MUST deploy with --no-verify-jwt.
[functions.dossier-review-edge]
verify_jwt = false
