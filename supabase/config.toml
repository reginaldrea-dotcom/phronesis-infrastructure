project_id = "vysenpymsfhgionqfulf"

# api-prime-invoke is called by the Prime interfaces without a JWT (anon, no auth
# header). It MUST deploy with verify_jwt disabled or the interface breaks.
[functions.api-prime-invoke]
verify_jwt = false

# theo-dispatch-worker is invoked by pg_cron (service-to-service), which presents
# a secret key in the `apikey` header. The new Supabase API keys are not JWTs and
# cannot pass the verify_jwt gate, so per Supabase guidance verify_jwt is disabled
# and the worker validates the caller itself (see functions/theo-dispatch-worker/
# lib/auth.ts). MUST deploy with --no-verify-jwt.
[functions.theo-dispatch-worker]
verify_jwt = false

# grounding-worker is the cron-ticked drainer of grounding_queue. Like theo-dispatch-worker it is
# platform-ungated (verify_jwt=false) and self-guards via the apikey secret (WORKER_INVOKE_KEY). It calls
# api-prime-invoke per claim to keep Angelia's judgment in the loop. MUST deploy with --no-verify-jwt.
[functions.grounding-worker]
verify_jwt = false

# live-report is the recompute endpoint for the live AESSEAL report. Like
# theo-render-data it is Cloudflare-gated and UUID-addressed (session_id is the
# capability), called from the surface with the publishable key and no JWT, so
# verify_jwt is disabled. MUST deploy with --no-verify-jwt.
[functions.live-report]
verify_jwt = false

# research-feed is the multi-research awareness poll endpoint (the knocker-upper seed).
# Cloudflare-gated, called from the surface with the publishable key and no JWT; reads
# theo_session/engine_dispatch with the service-role credential. MUST deploy with --no-verify-jwt.
[functions.research-feed]
verify_jwt = false

# relay-iti-promote is the Navigator board's promote-to-top write (Fix 5): templates a baton's
# ITI and upserts relay_iti (service-write only). Cloudflare-gated, called from the board with
# the publishable key and no JWT. MUST deploy with --no-verify-jwt.
[functions.relay-iti-promote]
verify_jwt = false

# dossier-curate-link is the supporting-link accept/reject write (Theo b63ec6d5). INTERIM model "B"
# (Reg, 7 Jul 2026): Cloudflare-edge-trusted, UUID-addressed (section_id), called from the internal
# dossier page with the publishable key and no JWT; writes synthesis_section.support_links with the
# service-role credential. Buttons are suppressed on the external token share. MUST deploy with
# --no-verify-jwt. HARDENING (Aegis): move to a same-origin Access-verified proxy for provable Reg-only.
[functions.dossier-curate-link]
verify_jwt = false
