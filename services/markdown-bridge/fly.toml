# Fly.io app config for the Markdown Bridge render service (Doc storage 4/4, d216b2fb).
# Fly builds the image on its REMOTE builder from ./Dockerfile — no local Docker needed.
#
# Deploy:
#   fly deploy -c services/markdown-bridge/fly.toml          # from repo root, with FLY_API_TOKEN set
# Secrets (set once, never in this file or the repo):
#   fly secrets set BRIDGE_API_KEY=<generated> GOOGLE_SERVICE_ACCOUNT_JSON=<base64-or-raw> -a phronesis-markdown-bridge
#
# App name is global on Fly — rename if taken. Region lhr (London); change to taste.

app = "phronesis-markdown-bridge"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle, wake on request — keeps a low-traffic render service ~free.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  # pandoc + weasyprint render of a large prose/table doc fits comfortably in 1GB.
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
