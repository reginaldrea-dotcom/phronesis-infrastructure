<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argos — Phronesis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #FAFAF8;
      --surface:       #FFFFFF;
      --parchment:     #F5F1EB;
      --panel-bg:      #F7F4EE;
      --text:          #1C1C1A;
      --text-muted:    #6B6962;
      --text-light:    #A8A49C;
      --border:        #E2DED8;
      --border-lt:     #EDEBE4;
      --bar-green:     #3D6B50;
      --bar-amber:     #A87820;
      --bar-red:       #8B3020;
      --btn:           #2C2C2A;
      --btn-text:      #FAFAF8;
      --accent:        #1B4D4D;
      --accent-dim:    rgba(27, 77, 77, 0.10);
      --accent-border: rgba(27, 77, 77, 0.35);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Lora', Georgia, serif; font-size: 15px; line-height: 1.7;
      -webkit-font-smoothing: antialiased; }

    .shell { display: flex; flex-direction: column; height: 100vh; }
    .nav-strip { height: 34px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: var(--bg); border-bottom: 1px solid var(--border-lt); }
    .nav-link { display: flex; align-items: center; gap: 6px; text-decoration: none; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 12.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); transition: color 0.15s; }
    .nav-link:hover { color: var(--text); }
    .nav-icon { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .main { display: flex; flex-direction: row; flex: 1; overflow: hidden; justify-content: center; }
    .left-col { display: flex; flex-direction: column; flex: 1; max-width: 820px; min-width: 0; position: relative; }
    .header { flex-shrink: 0; padding: 18px 24px 0; }
    .header-row { display: flex; align-items: flex-start; justify-content: space-between; }
    .prime-identity { display: flex; align-items: center; gap: 14px; }
    .prime-icon { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-dim); border: 1.5px solid var(--accent-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 16px; color: var(--accent); }
    .prime-name { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 28px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; line-height: 1.1; }
    .prime-role { font-family: 'Lora', Georgia, serif; font-size: 12px; font-style: italic; color: var(--text-muted); margin-top: 3px; }
    .session-meta { text-align: right; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13.5px; color: var(--text); letter-spacing: 0.03em; line-height: 1.8; }
    .token-bar-wrap { margin-top: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border-lt); position: relative; cursor: default; }
    .token-bar-track { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .token-bar-fill { height: 100%; width: 0%; background: var(--bar-green); border-radius: 1px; transition: width 0.5s ease, background 0.5s ease; }
    .token-bar-tooltip { display: none; position: absolute; top: 7px; right: 0; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; white-space: nowrap; }
    .token-bar-wrap:hover .token-bar-tooltip { display: block; }
    .conversation { flex: 1; overflow-y: auto; padding: 24px 24px 12px; scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .session-divider { text-align: center; position: relative; margin: 4px 0 20px; }
    .session-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border-lt); }
    .session-divider span { position: relative; background: var(--bg); padding: 0 12px; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); }
    .turn-wake { background: var(--accent-dim); border-left: 2.5px solid var(--accent-border); border-radius: 0 6px 6px 0; padding: 14px 18px; margin-bottom: 24px; }
    .turn-wake .turn-label { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 7px; }
    .turn-wake .turn-content { font-style: italic; font-size: 14px; color: var(--text); line-height: 1.65; }
    .turn-user { background: var(--parchment); border-radius: 3px; padding: 11px 16px; margin-bottom: 2px; max-width: 92%; }
    .turn-user .turn-label { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
    .turn-user .turn-time { font-weight: 400; margin-left: 8px; letter-spacing: 0.03em; }
    .turn-user .turn-content { font-size: 15px; line-height: 1.7; white-space: pre-wrap; }
    .turn-assistant { background: var(--surface); border-left: 2.5px solid var(--accent); border-radius: 0 3px 3px 0; padding: 13px 18px; margin-bottom: 18px; max-width: 96%; position: relative; }
    .turn-assistant .turn-label { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .turn-content { font-size: 15px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .turn-tokens { margin-top: 8px; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; }
    .artefact-ref { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; padding: 5px 10px; background: var(--parchment); border-radius: 2px; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; }
    .pin-btn { position: absolute; right: 10px; top: 10px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; cursor: pointer; font-size: 16px; color: var(--text-muted); border: none; background: none; padding: 0; }
    .turn-assistant:hover .pin-btn { opacity: 1; }
    .turn-assistant.pinned .pin-btn { opacity: 1; color: var(--accent); }
    .turn-assistant.pinned::after { content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 14px 14px 0; border-color: transparent var(--accent-border) transparent transparent; }
    .attention-divider { display: flex; align-items: center; gap: 10px; margin: 6px 0 18px; opacity: 0.7; }
    .attention-divider::before, .attention-divider::after { content: ''; flex: 1; height: 1px; background: var(--accent-dim); }
    .attention-divider span { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); opacity: 0.6; white-space: nowrap; }
    .retirement-prompt { display: flex; align-items: center; gap: 10px; padding: 10px 0; margin-bottom: 8px; animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .retirement-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bar-amber); flex-shrink: 0; animation: dotPulse 2.5s ease-in-out infinite; }
    @keyframes dotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .retirement-text { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px; font-style: italic; color: var(--text-muted); letter-spacing: 0.02em; }
    .retirement-confirm { text-align: center; padding: 14px 0; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 14px; font-style: italic; color: var(--text-muted); animation: fadeIn 0.8s ease forwards; }
    .thinking { display: none; padding: 8px 0 8px 18px; font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 14px; color: var(--text-muted); border-left: 2px solid var(--border); margin-bottom: 18px; animation: thinkPulse 2s ease-in-out infinite; }
    .thinking.visible { display: block; }
    @keyframes thinkPulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    .input-area { flex-shrink: 0; padding: 12px 24px 20px; border-top: 1px solid var(--border); }
    .image-preview { display: none; align-items: center; gap: 8px; padding: 8px 10px; margin-bottom: 6px; background: var(--parchment); border-radius: 2px; border: 1px solid var(--border); }
    .image-preview.visible { display: flex; }
    .image-preview img { width: 48px; height: 48px; object-fit: cover; border-radius: 2px; }
    .image-preview-name { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 12px; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-remove-image { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 14px; padding: 0; transition: color 0.15s; }
    .btn-remove-image:hover { color: var(--text); }
    .input-row { display: flex; align-items: flex-start; gap: 8px; }
    .btn-attach { flex-shrink: 0; width: 36px; height: 36px; margin-top: 2px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 2px; background: transparent; cursor: pointer; color: var(--text-muted); transition: color 0.15s, border-color 0.15s; }
    .btn-attach:hover { color: var(--text-muted); border-color: var(--text-muted); }
    #file-input { display: none; }
    textarea { flex: 1; min-height: 72px; max-height: 160px; padding: 11px 13px; resize: none; outline: none; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; font-family: 'Lora', Georgia, serif; font-size: 14px; color: var(--text); line-height: 1.65; transition: border-color 0.2s; }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-light); font-style: italic; }
    .input-controls { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
    .btn { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px; font-weight: 500; letter-spacing: 0.06em; padding: 7px 18px; border-radius: 2px; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover:not(:disabled) { opacity: 0.75; }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-send { background: var(--btn); color: var(--btn-text); border: none; padding: 7px 22px; }
    .btn-new-session { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .error-state { margin-top: 8px; padding: 10px 14px; border-radius: 2px; border-left: 2.5px solid; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px; line-height: 1.5; display: none; animation: fadeIn 0.3s ease; }
    .error-state.visible { display: block; }
    .error-state.rate-limit  { background: rgba(168,120,32,0.08); border-left-color: var(--bar-amber); color: var(--bar-amber); }
    .error-state.api-error   { background: rgba(139,48,32,0.06);  border-left-color: var(--bar-red);   color: var(--bar-red); }
    .error-state.ctx-exceeded { background: rgba(139,48,32,0.06); border-left-color: var(--bar-red);   color: var(--bar-red); }
    .error-countdown { font-size: 11px; opacity: 0.7; margin-top: 4px; }
    .error-dismiss { background: none; border: 1px solid currentColor; color: inherit; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; padding: 2px 8px; border-radius: 2px; cursor: pointer; margin-top: 6px; opacity: 0.7; }
    .error-dismiss:hover { opacity: 1; }
    .panel-toggle { position: absolute; right: -1px; bottom: 40px; width: 20px; padding: 8px 0; background: var(--panel-bg); border: 1px solid var(--border); border-right: none; border-radius: 2px 0 0 2px; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 10px; color: var(--text-light); writing-mode: vertical-rl; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; display: none; align-items: center; justify-content: center; gap: 4px; transition: color 0.15s; }
    .panel-toggle.visible { display: flex; }
    .panel-toggle:hover { color: var(--text-muted); }
    .panel-badge { display: none; width: 14px; height: 14px; background: var(--accent); color: white; font-size: 8px; border-radius: 50%; align-items: center; justify-content: center; writing-mode: horizontal-tb; }
    .panel-badge.visible { display: flex; }
    .artefact-panel { width: 280px; flex-shrink: 0; background: var(--panel-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: width 0.25s ease; overflow: hidden; }
    .artefact-panel.closed { width: 0; border-left: none; }
    .panel-header { padding: 18px 16px 12px; border-bottom: 1px solid var(--border-lt); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .panel-label { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
    .panel-close { background: none; border: none; font-size: 16px; color: var(--text-light); cursor: pointer; padding: 0; line-height: 1; transition: color 0.15s; }
    .panel-close:hover { color: var(--text); }
    .panel-scroll { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .panel-section-label { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light); padding: 10px 16px 6px; }
    .panel-empty { padding: 24px 16px; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 12px; color: var(--text-light); font-style: italic; text-align: center; }
    .pinned-entry { padding: 8px 16px; border-bottom: 1px solid var(--border-lt); cursor: pointer; display: flex; align-items: flex-start; gap: 6px; transition: background 0.15s; }
    .pinned-entry:hover { background: rgba(0,0,0,0.03); }
    .pinned-icon { font-size: 10px; color: var(--accent); margin-top: 2px; flex-shrink: 0; }
    .pinned-excerpt { font-size: 12px; color: var(--text-muted); font-style: italic; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .artefact-entry { padding: 10px 16px; border-bottom: 1px solid var(--border-lt); }
    .artefact-title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px; color: var(--text); letter-spacing: 0.02em; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .artefact-meta { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 10.5px; color: var(--text-light); letter-spacing: 0.04em; margin-bottom: 8px; }
    .artefact-actions { display: flex; gap: 4px; flex-wrap: wrap; }
    .btn-artefact { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 2px; background: var(--surface); color: var(--text-muted); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .btn-artefact:hover { background: var(--parchment); }
    .btn-artefact.hold { color: var(--text); background: rgba(100,80,40,0.04); }
    .btn-artefact.hold:hover { background: rgba(100,80,40,0.09); border-color: rgba(100,80,40,0.3); }

    /* ── Inspect modal ── */
    .inspect-modal-overlay { position: fixed; inset: 0; background: rgba(28,28,26,0.45); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
    .inspect-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; width: 100%; max-width: 680px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(28,28,26,0.15); }
    .inspect-modal-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border-lt); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .inspect-modal-title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 14px; color: var(--text); letter-spacing: 0.02em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 12px; }
    .inspect-modal-close { background: none; border: none; font-size: 18px; color: var(--text-light); cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; transition: color 0.15s; }
    .inspect-modal-close:hover { color: var(--text); }
    .inspect-modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .inspect-modal-content { font-family: 'Lora', Georgia, serif; font-size: 13.5px; color: var(--text); line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .inspect-modal-footer { padding: 12px 20px; border-top: 1px solid var(--border-lt); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }

    /* ── Hold-this modal ── */
    .hold-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; width: 100%; max-width: 520px; max-height: 88vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(28,28,26,0.15); }
    .hold-modal-head { padding: 16px 22px 12px; border-bottom: 1px solid var(--border-lt); flex-shrink: 0; }
    .hold-modal-title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; line-height: 1.2; }
    .hold-modal-subtitle { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 12px; color: var(--accent); margin-top: 3px; letter-spacing: 0.04em; }
    .hold-modal-body { padding: 16px 22px; overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .hold-modal-foot { padding: 12px 22px 16px; border-top: 1px solid var(--border-lt); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
    .hold-field-group { margin-bottom: 14px; }
    .hold-field-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .hold-field-row .hold-field-group { flex: 1; margin-bottom: 0; }
    .hold-field-label { display: block; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .hold-field-hint { font-size: 12px; color: var(--text-light); font-style: italic; line-height: 1.5; margin-bottom: 6px; }
    .hold-tag { display: inline-block; margin-left: 6px; padding: 1px 6px; background: var(--border-lt); border-radius: 2px; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light); }
    .hold-modal input[type="text"], .hold-modal textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 2px; background: var(--bg); color: var(--text); font-family: 'Lora', Georgia, serif; font-size: 13px; line-height: 1.6; outline: none; transition: border-color 0.15s; resize: vertical; }
    .hold-modal input[type="text"]:focus, .hold-modal textarea:focus { border-color: var(--accent); }
    .hold-modal input[type="text"]::placeholder, .hold-modal textarea::placeholder { color: var(--text-light); font-style: italic; }
    .hold-amend-display { background: var(--parchment); border-radius: 4px; border: 1px solid var(--border-lt); border-left: 2.5px solid rgba(100,80,40,0.25); padding: 12px 14px; margin-bottom: 16px; }
    .hold-amend-label, .hold-amend-log-label { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light); margin-bottom: 6px; display: block; }
    .hold-amend-log-label { margin-top: 10px; }
    .hold-amend-current { font-size: 13px; color: var(--text); line-height: 1.65; margin-bottom: 4px; }
    .hold-amend-entry { font-size: 12px; color: var(--text-muted); line-height: 1.6; padding: 6px 0; border-top: 1px solid var(--border-lt); }
    .hold-amend-entry:first-child { border-top: none; padding-top: 0; }
    .hold-type-badge { display: inline-block; padding: 1px 6px; margin-right: 4px; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 2px; vertical-align: middle; }
    .hold-type-badge.world    { background: rgba(60,100,70,0.1); color: #2D6040; }
    .hold-type-badge.revision { background: rgba(80,60,120,0.1); color: #4A3870; }
    .hold-date-prelabel { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .hold-date-str { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; flex-shrink: 0; }
    .hold-btn-cancel { padding: 7px 18px; border: 1px solid var(--border); border-radius: 2px; background: transparent; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .hold-btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    .hold-btn-primary { padding: 7px 22px; border: none; border-radius: 2px; background: var(--btn); font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px; color: var(--btn-text); cursor: pointer; transition: opacity 0.15s; letter-spacing: 0.02em; }
    .hold-btn-primary:hover { opacity: 0.82; }
    .hold-btn-primary:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-strip">
      <a id="nav-link" href="#" target="_blank" class="nav-link"><span class="nav-icon"></span><span>Navigator</span></a>
      <a href="https://claude.ai/projects" target="_blank" class="nav-link">Claude Projects</a>
    </div>
    <div class="main">
      <div class="left-col">
        <div class="header">
          <div class="header-row">
            <div class="prime-identity">
              <div class="prime-icon" id="prime-icon"></div>
              <div><div class="prime-name" id="prime-name"></div><div class="prime-role" id="prime-role"></div></div>
            </div>

  <script>

    /* ── Apply theme ── */

    /* ── State ── */

    /* ── Helpers ── */
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function timeStr() { return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
    function todayStr() { return new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function scrollBottom() { conv.scrollTop = conv.scrollHeight; }
    function insertBefore(el) { conv.insertBefore(el, thinking); }

    /* ── Supabase REST (publishable key — apikey header only, not Bearer) ── */
    async function supabaseRest(method, table, params, body) {
      const url = new URL(`${PRIME_CONFIG.supabaseUrl}/rest/v1/${table}`);
      if (params) Object.entries(params).forEach(([k,v]) => url.searchParams.append(k, v));
      const headers = { 'apikey': PRIME_CONFIG.supabaseKey };
      if (body) headers['Content-Type'] = 'application/json';
      if (method === 'POST' || method === 'PATCH') headers['Prefer'] = 'return=representation';
      const opts = { method, headers };
      if (body) opts.body = JSON.stringify(body);
      try {
        const res = await fetch(url.toString(), opts);
        if (!res.ok) return null;
        const text = await res.text();
        return text ? JSON.parse(text) : [];
      } catch { return null; }
    }

    /* ── MST content helpers ── */
    function parseMst(content) {
      const csIdx = content.indexOf('CURRENT STATE');
      const alIdx = content.indexOf('AMENDMENTS LOG');
      const csText = (csIdx !== -1 && alIdx !== -1)
        ? content.slice(csIdx + 'CURRENT STATE'.length, alIdx).replace(/^\n+/,'').trim()
        : (csIdx !== -1 ? content.slice(csIdx + 'CURRENT STATE'.length).replace(/^\n+/,'').trim() : '');
      const alText = alIdx !== -1
        ? content.slice(alIdx + 'AMENDMENTS LOG'.length).replace(/^\n+/,'').trim()
        : '';
      const entries = alText ? alText.split(/\n{2,}/).filter(e => e.trim()).slice(-3) : [];
      return { currentState: csText, amendments: entries };
    }

    function assembleMstContent(q1, q2, q3, q4) {
      return 'REASONING MEMBRANE\n\n' + q1.trim() + '\n\n' + q2.trim() + '\n\n' + q3.trim() +
             '\n\nCURRENT STATE\n\n' + q4.trim() + '\n\nAMENDMENTS LOG\n';
    }

    function updateMstContent(existing, newCurrentState, dateEntry) {
      let c = existing;
      const csIdx = c.indexOf('CURRENT STATE');
      const alIdx = c.indexOf('AMENDMENTS LOG');
      if (csIdx !== -1 && alIdx !== -1) {
        c = c.slice(0, csIdx) + 'CURRENT STATE\n\n' + newCurrentState.trim() + '\n\n' + c.slice(alIdx);
      }
      return c.trimEnd() + '\n\n' + dateEntry + '\n';
    }

    function extractCurrentState(entry) {
      const clean = entry.replace(/^(WORLD-STATE UPDATE|REASONING REVISION):\s*/i,'').trim();
      const nsIdx = clean.toLowerCase().indexOf('next step');
      if (nsIdx !== -1) {
        const end = clean.indexOf('\n', nsIdx);
        return clean.slice(0, end !== -1 ? end : undefined).trim();
      }
      return ((clean.match(/[^.!?]+[.!?]+/g) || [clean]).slice(0,2)).join(' ').trim();
    }

    /* ── Hold-this: trigger (click on button) ── */
    async function triggerHoldThis(art, btnEl) {
      const orig = btnEl.textContent;
      btnEl.textContent = 'Checking\u2026'; btnEl.disabled = true;

      const domain = art.title || '';
      let existingMst = null;
      const rows = await supabaseRest('GET', 'artifacts', {
        'artifact_type':     'eq.MST',
        'metadata->>status': 'eq.active',
        'metadata->>domain': `eq.${domain}`,
        'select': 'id,content,metadata',
        'limit':  '1',
      });
      if (rows && rows.length > 0) existingMst = rows[0];

      btnEl.textContent = orig; btnEl.disabled = false;

      if (existingMst) openHoldAmend(domain, existingMst);
      else             openHoldCreate(domain);
    }

    /* ── Hold-this: CREATE modal ── */
    function openHoldCreate(domainSuggestion) {
      const ex = document.getElementById('hold-modal-overlay');
      if (ex) ex.remove();

      const prompts = HOLD_PROMPTS.code;
      const fieldsHtml = prompts.map((p,i) =>
        `<div class="hold-field-group">` +
        `<label class="hold-field-label">${esc(p.label)}</label>` +
        `<div class="hold-field-hint">${esc(p.hint)}</div>` +
        `<textarea id="hq${i}" rows="3" placeholder="${esc(p.placeholder)}"></textarea>` +
        `</div>`
      ).join('');

      const overlay = document.createElement('div');
      overlay.id = 'hold-modal-overlay';
      overlay.className = 'inspect-modal-overlay';
      overlay.innerHTML =
        `<div class="hold-modal">` +
        `<div class="hold-modal-head"><div class="hold-modal-title">Hold this \u2014 new</div>` +
        `<div class="hold-modal-subtitle">No existing membrane found for this domain</div></div>` +
        `<div class="hold-modal-body">` +
        `<div class="hold-field-row">` +
        `<div class="hold-field-group" style="flex:1.1"><label class="hold-field-label">Domain name</label>` +
        `<input type="text" id="h-domain" value="${esc(domainSuggestion)}" placeholder="e.g. argos.html \u2014 auth flow"></div>` +
        `<div class="hold-field-group" style="flex:0.9"><label class="hold-field-label">Work reference <span class="hold-tag">optional</span></label>` +
        `<input type="text" id="h-ref" placeholder="Artifact ID, path, or URL"></div>` +
        `</div>` + fieldsHtml + `</div>` +
        `<div class="hold-modal-foot">` +
        `<button class="hold-btn-cancel" id="h-cancel">Cancel</button>` +
        `<button class="hold-btn-primary" id="h-submit">Hold this</button>` +
        `</div></div>`;

      overlay.querySelector('#h-cancel').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector('#h-submit').addEventListener('click', async () => {
        const domain  = (document.getElementById('h-domain')?.value||'').trim();
        const workRef = (document.getElementById('h-ref')?.value||'').trim();
        const answers = prompts.map((_,i) => (document.getElementById(`hq${i}`)?.value||'').trim());
        if (!domain || !answers[0] || !answers[3]) {
          alert('Domain name, first question, and current status are required.'); return;
        }
        await commitHoldCreate(overlay, domain, workRef, answers);
      });
      document.body.appendChild(overlay);
    }

    /* ── Hold-this: AMEND modal ── */
    function openHoldAmend(domain, existingMst) {
      const ex = document.getElementById('hold-modal-overlay');
      if (ex) ex.remove();

      const parsed      = parseMst(existingMst.content || '');
      const lastTouched = existingMst.metadata?.last_touched || 'previously';

      const amendmentsHtml = parsed.amendments.length > 0
        ? parsed.amendments.map(entry => {
            const isW = /WORLD-STATE UPDATE/i.test(entry);
            const isR = /REASONING REVISION/i.test(entry);
            const badge = isW ? `<span class="hold-type-badge world">World-state</span>`
                        : isR ? `<span class="hold-type-badge revision">Reasoning revision</span>` : '';
            return `<div class="hold-amend-entry">${badge}${esc(entry)}</div>`;
          }).join('')
        : `<div class="hold-amend-entry" style="color:var(--text-light);font-style:italic">No amendments yet.</div>`;

      const overlay = document.createElement('div');
      overlay.id = 'hold-modal-overlay';
      overlay.className = 'inspect-modal-overlay';
      overlay.innerHTML =
        `<div class="hold-modal">` +
        `<div class="hold-modal-head"><div class="hold-modal-title">Amend</div>` +
        `<div class="hold-modal-subtitle">${esc(domain)} \xb7 last touched ${esc(lastTouched)}</div></div>` +
        `<div class="hold-modal-body">` +
        `<div class="hold-amend-display">` +
        `<span class="hold-amend-label">Current state</span>` +
        `<div class="hold-amend-current">${esc(parsed.currentState || 'No current state recorded.')}</div>` +
        `<span class="hold-amend-log-label">Recent amendments</span>` +
        amendmentsHtml + `</div>` +
        `<div class="hold-field-group">` +
        `<label class="hold-field-label">Amendment entry</label>` +
        `<div class="hold-date-prelabel"><span class="hold-date-str">${esc(todayStr())}</span>` +
        `<span class="hold-field-hint" style="margin:0"> \u2014 type (WORLD-STATE UPDATE or REASONING REVISION), what changed, status, next step</span></div>` +
        `<textarea id="h-amend-entry" rows="5" placeholder="WORLD-STATE UPDATE: \u2026 Status: active \u2192 paused. Next step: \u2026"></textarea>` +
        `</div></div>` +
        `<div class="hold-modal-foot">` +
        `<button class="hold-btn-cancel" id="h-cancel">Cancel</button>` +
        `<button class="hold-btn-primary" id="h-submit">Amend</button>` +
        `</div></div>`;

      overlay.querySelector('#h-cancel').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector('#h-submit').addEventListener('click', async () => {
        const entry = (document.getElementById('h-amend-entry')?.value||'').trim();
        if (!entry) return;
        await commitHoldAmend(overlay, existingMst, entry);
      });
      document.body.appendChild(overlay);
    }

    /* ── Hold-this: commit CREATE ── */
    async function commitHoldCreate(overlay, domain, workRef, answers) {
      const btn = overlay.querySelector('#h-submit');
      btn.textContent = 'Saving\u2026'; btn.disabled = true;

      const content  = assembleMstContent(answers[0], answers[1], answers[2], answers[3]);
      const metadata = {
        domain, prime_lineage: PRIME_CONFIG.lineage,
        status: 'active', domain_type: 'code',
        work_reference: workRef || null,
        last_touched: new Date().toISOString().slice(0,10),
      };

      const result = await supabaseRest('POST', 'artifacts', null, {
        instance_id: PRIME_CONFIG.instanceId, title: domain,
        artifact_type: 'MST', content, metadata,
      });

      if (result && result.length > 0) {
        overlay.remove();
        showHoldConfirm('Membrane held.', result[0].id || '');
      } else {
        btn.textContent = 'Hold this'; btn.disabled = false;
        showHoldError(overlay, 'Could not write to Supabase — RLS may be blocking anon writes. Report to Reg.');
      }
    }

    /* ── Hold-this: commit AMEND ── */
    async function commitHoldAmend(overlay, existingMst, newEntry) {
      const btn = overlay.querySelector('#h-submit');
      btn.textContent = 'Saving\u2026'; btn.disabled = true;

      const dateEntry      = `[${todayStr()}]\n${newEntry}`;
      const newCurrentState = extractCurrentState(newEntry);
      const updatedContent = updateMstContent(existingMst.content || '', newCurrentState, dateEntry);
      const updatedMetadata = { ...(existingMst.metadata||{}), last_touched: new Date().toISOString().slice(0,10) };

      const result = await supabaseRest('PATCH', 'artifacts', { 'id': `eq.${existingMst.id}` },
        { content: updatedContent, metadata: updatedMetadata });

      if (result !== null) {
        overlay.remove();
        showHoldConfirm('Amendment saved.', existingMst.id);
      } else {
        btn.textContent = 'Amend'; btn.disabled = false;
        showHoldError(overlay, 'Could not write to Supabase — RLS may be blocking anon writes. Report to Reg.');
      }
    }

      d.className = 'retirement-prompt'; d.style.cssText = 'padding:6px 0;margin-bottom:4px;';

        `<div class="retirement-text">${esc(message)}${artifactId ? ' \xb7 ' + String(artifactId).slice(0,8) : ''}</div>`;
      insertBefore(d); setTimeout(() => d.remove(), 6000); scrollBottom();

      let err = overlay.querySelector('.hold-err');
      if (err) err.remove();
      err = document.createElement('div'); err.className = 'hold-err';
      err.style.cssText = 'margin:8px 22px 0;padding:8px 12px;background:rgba(139,48,32,0.06);border-left:2.5px solid var(--bar-red);border-radius:2px;font-family:\'Cormorant Garamond\',Georgia,serif;font-size:12px;color:var(--bar-red);line-height:1.5;';
      err.textContent = message;
      overlay.querySelector('.hold-modal').insertBefore(err, overlay.querySelector('.hold-modal-foot'));
    }

      tokenFill.style.background = pct < 70 ? 'var(--bar-green)' : pct < 85 ? 'var(--bar-amber)' : 'var(--bar-red)';
      tokenTip.textContent       = total.toLocaleString() + ' / ' + PRIME_CONFIG.maxTokens.toLocaleString() + ' tokens';
      if (pct >= 85 && !retirementShown) { retirementShown = true; renderRetirementPrompt(); }
    }

      const seq = ++turnSequence; const excerpt = text.trim().slice(0,200);
      const d = document.createElement('div'); d.className = 'turn-assistant'; d.dataset.seq = seq;
      let artsHtml = '';
      if (arts && arts.length > 0) artsHtml = arts.map(a => `<div class="artefact-ref">&#128206; ${esc(a.title)} \u2014 in artefact panel</div>`).join('');
      d.innerHTML =
        `<button class="pin-btn" title="Pin turn">\u2385</button>` +
        `<div class="turn-label">${esc(PRIME_CONFIG.name)} <span style="font-weight:400;margin-left:8px;font-size:11px;opacity:0.7">${timeStr()}</span></div>` +
        `<div class="turn-content">${esc(text)}</div>` + artsHtml +
        `<div class="turn-tokens">${(tokens||0).toLocaleString()} tokens</div>`;
      d.querySelector('.pin-btn').addEventListener('click', () => togglePin(d, seq, excerpt));
      insertBefore(d);
      if (arts && arts.length > 0) { arts.forEach(a => addArtefact(a)); openPanel(); }
      return d;

    function renderRetirementPrompt() {
      if (document.getElementById('retirement-prompt')) return;

        `<button class="error-dismiss" id="btn-cancel-retire" style="margin-left:6px">Cancel</button>`;
      insertBefore(d); scrollBottom();
      document.getElementById('btn-confirm-retire').addEventListener('click', () => { d.remove(); retirementPending = false; triggerRetirement(rich); });
      document.getElementById('btn-cancel-retire').addEventListener('click',  () => { d.remove(); retirementPending = false; });
    }

    /* ── Inspect modal ── */
    function openInspectModal(title, content, footerConfig) {
      const ex = document.getElementById('inspect-modal-overlay'); if (ex) ex.remove();
      const overlay = document.createElement('div');

      overlay.innerHTML =
        `<div class="inspect-modal">` +
        `<div class="inspect-modal-header"><span class="inspect-modal-title">${esc(title)}</span><button class="inspect-modal-close">\u00d7</button></div>` +
        `<div class="inspect-modal-body"><pre class="inspect-modal-content">${esc(content)}</pre></div>` +
        `<div class="inspect-modal-footer">${footerHtml}</div></div>`;
      overlay.querySelector('.inspect-modal-close').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      footerConfig.forEach((btn,i) => overlay.querySelector(`[data-fi="${i}"]`).addEventListener('click', () => btn.action(overlay)));
      document.body.appendChild(overlay);
    }

    /* ── Error states ── */
    function showError(data) {
      clearError(); errorState.className = 'error-state visible'; btnSend.disabled = true;
      if (data.error_type === 'rate_limit_exceeded') {
        errorState.classList.add('rate-limit');
        let secs = data.retry_after_seconds || 30;
        errorState.innerHTML = `<div>${esc(data.message)}</div><div class="error-countdown" id="err-cd">Ready in ${secs}s</div>`;
        countdownInterval = setInterval(() => {
          secs--; const el = document.getElementById('err-cd');
          if (el) el.textContent = secs > 0 ? `Ready in ${secs}s` : 'Ready';
          if (secs <= 0) { clearError(); btnSend.disabled = false; }
        }, 1000);
      } else if (data.error_type === 'context_exceeded') {
        errorState.classList.add('ctx-exceeded');
        errorState.innerHTML = `<div>${esc(data.message)}</div><button class="btn btn-new-session error-dismiss" onclick="newSession()">New Session</button>`;
      } else {
        errorState.classList.add('api-error');
        const rid = data.request_id ? `<div class="error-countdown">${esc(data.request_id)}</div>` : '';
        errorState.innerHTML = `<div>${esc(data.message||data.error||'Something went wrong.')}</div>${rid}<button class="error-dismiss" onclick="clearError();document.getElementById('btn-send').disabled=false;">Dismiss</button>`;
      }
    }

    function clearError() {
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
      errorState.className = 'error-state'; errorState.innerHTML = '';
    }

    /* ── Panel ── */
    function openPanel()  { panelEl.classList.remove('closed'); panelToggle.classList.remove('visible'); }
    function closePanel() { panelEl.classList.add('closed');    panelToggle.classList.add('visible');    updateBadge(); }
    function updateBadge() {
      const n = artefacts.length + pinnedTurns.length;
      if (n > 0) { panelBadge.textContent = n; panelBadge.classList.add('visible'); }
      else panelBadge.classList.remove('visible');
    }
    function updatePanelEmpty() {
      const has = artefacts.length > 0 || pinnedTurns.length > 0;
      panelEmpty.style.display       = has ? 'none' : 'block';
      artefactsSection.style.display = artefacts.length > 0 ? 'block' : 'none';
      pannedSection.style.display    = pinnedTurns.length > 0 ? 'block' : 'none';
    }

    /* ── Add artefact ── */
    function addArtefact(art) {
      const existing = artefacts.filter(a => a.title === art.title).length;
      const version  = existing + 1;
      const entry    = { ...art, version, time: timeStr() };
      artefacts.push(entry);
      const idx = artefacts.length - 1;

      const el = document.createElement('div'); el.className = 'artefact-entry';
      el.innerHTML =
        `<div class="artefact-title">${esc(art.title)}</div>` +
        `<div class="artefact-meta">${esc(art.type||'code')} \xb7 ${entry.time}${version > 1 ? ' \xb7 v'+version : ''}</div>` +
        `<div class="artefact-actions">` +
        `<button class="btn-artefact hold"    data-action="hold"    data-idx="${idx}">Hold this</button>` +
        `<button class="btn-artefact"         data-action="inspect" data-idx="${idx}">Inspect</button>` +
        `<button class="btn-artefact"         data-action="copy"    data-idx="${idx}">Copy</button>` +
        `<button class="btn-artefact"         data-action="dismiss" data-idx="${idx}">Dismiss</button>` +
        `</div>`;

      el.addEventListener('click', e => {
        const btn = e.target.closest('[data-action]'); if (!btn) return;
        const i = parseInt(btn.dataset.idx); const storedArt = artefacts[i];

        if (btn.dataset.action === 'hold') {
          if (!storedArt) return;
          triggerHoldThis(storedArt, btn);

        } else if (btn.dataset.action === 'inspect') {
          if (!storedArt) return;
          const content = storedArt.content || '';
          openInspectModal(storedArt.title, content, [
            { label: 'Open in tab', className: 'btn-artefact', action: () => { const b = new Blob([content],{type:'text/plain'}); window.open(URL.createObjectURL(b)); }},
            { label: 'Copy',        className: 'btn-artefact', action: (ov) => { navigator.clipboard.writeText(content).catch(()=>{}); ov.remove(); }},
            { label: 'Close',       className: 'btn-artefact', action: (ov) => ov.remove() },
          ]);

        } else if (btn.dataset.action === 'copy') {
          navigator.clipboard.writeText(storedArt?.content||'').then(() => {
            btn.textContent = 'Copied \u2713'; setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
          }).catch(()=>{});

        } else if (btn.dataset.action === 'dismiss') {
          artefacts.splice(i, 1);
          el.style.cssText = 'opacity:0;max-height:0;overflow:hidden;transition:opacity 0.2s,max-height 0.2s';
          setTimeout(() => el.remove(), 200);
          updatePanelEmpty(); updateBadge();
        }
      });

      artefactsList.appendChild(el);
      updatePanelEmpty(); updateBadge();
    }

    /* ── Pin ── */
    function togglePin(turnEl, seq, excerpt) {
      if (turnEl.classList.contains('pinned')) {
        turnEl.classList.remove('pinned');
        pinnedTurns = pinnedTurns.filter(p => p.seq !== seq);
        const pe = document.getElementById('pin-' + seq); if (pe) pe.remove();
      } else {
        const turnTime = turnEl.querySelector('.turn-label span')?.textContent?.trim() || '';
        turnEl.classList.add('pinned');
        pinnedTurns.push({ seq, excerpt, el: turnEl });
        const pe = document.createElement('div'); pe.className = 'pinned-entry'; pe.id = 'pin-' + seq;
        pe.innerHTML = `<span class="pinned-icon">\u2385</span><span class="pinned-excerpt">${esc(excerpt)}\u2026</span>`;
        pe.addEventListener('click', () => {
          const fullContent = turnEl.querySelector('.turn-content')?.textContent || excerpt;
          const modalTitle  = seq === 'wake'
            ? `Wake orientation \u2014 ${PRIME_CONFIG.name}`
            : `Pinned turn \u2014 ${PRIME_CONFIG.name}${turnTime ? ', '+turnTime : ''}`;
          openInspectModal(modalTitle, fullContent, [
            { label: 'Release pin', className: 'btn-artefact', action: (ov) => { ov.remove(); togglePin(turnEl, seq, excerpt); }},
            { label: 'Close',       className: 'btn-artefact', action: (ov) => ov.remove() },
          ]);
        });
        pinnedList.appendChild(pe); openPanel();
      }
      updateThinking(); updatePanelEmpty(); updateBadge();
    }

    function updateThinking() {
      const n = pinnedTurns.length;
      const base = isWaking ? `${PRIME_CONFIG.name} is waking\u2026` : `${PRIME_CONFIG.name} is thinking\u2026`;
      thinking.textContent = n > 0 ? `${PRIME_CONFIG.name} is thinking\u2026 holding ${n} pinned turn${n!==1?'s':''}` : base;
    }

    /* ── Image handling ── */
    document.getElementById('btn-attach').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        pendingImage = { data: ev.target.result.split(',')[1], media_type: file.type };
        previewImg.src = ev.target.result; previewName.textContent = file.name;
        imgPreview.classList.add('visible');
      };
      reader.readAsDataURL(file); fileInput.value = '';
    });
    document.getElementById('btn-remove-image').addEventListener('click', () => {
      pendingImage = null; imgPreview.classList.remove('visible'); previewImg.src = '';
    });

    /* ── Retirement ── */
    async function triggerRetirement(rich) {
      renderUser(rich ? 'bfn-R' : 'bfn');
      inputEl.disabled = true; btnSend.disabled = true;
      const data = await invoke('', false, { retire: true, rich });
      thinking.classList.remove('visible');
      if (data) renderAssistant(data.response, data.usage?.output_tokens||0, data.artifacts||[]);
      const d = document.createElement('div'); d.className = 'retirement-confirm';
      d.textContent = `Session closed. ${PRIME_CONFIG.name} will remember.`;
      insertBefore(d);
      const rp = document.getElementById('retirement-prompt'); if (rp) rp.remove();
      scrollBottom();
    }

    /* ── Invoke ── */
    async function invoke(message, isWake = false, opts = {}) {
      const pCount = pinnedTurns.length;
      thinking.textContent = isWake ? `${PRIME_CONFIG.name} is waking\u2026`
        : pCount > 0 ? `${PRIME_CONFIG.name} is thinking\u2026 holding ${pCount} pinned turn${pCount!==1?'s':''}`
        : `${PRIME_CONFIG.name} is thinking\u2026`;
      thinking.classList.add('visible'); scrollBottom();
      let lastError = null;

      for (let attempt = 0; attempt < RETRY_LIMIT; attempt++) {
        if (attempt > 0) {
          thinking.textContent = isWake ? `${PRIME_CONFIG.name} is waking\u2026 (retry ${attempt})` : `${PRIME_CONFIG.name} is thinking\u2026 (retry ${attempt})`;
          await sleep(RETRY_DELAY);
        }
        try {
          const body = {
            lineage_name: PRIME_CONFIG.lineage,
            user_message: message,
            pinned_turns: pinnedTurns.map(p => ({ role:'assistant', content: p.el.querySelector('.turn-content')?.textContent || p.excerpt })),
          };
          if (sessionId)    body.session_id = sessionId;
          if (opts.retire)  body.retire      = true;
          if (opts.rich)    body.rich        = true;
          if (pendingImage) { body.image = pendingImage; pendingImage = null; imgPreview.classList.remove('visible'); }

          const ctl = new AbortController();
          const timeout = isWake ? 60000 : FETCH_TIMEOUT;
          const tid = setTimeout(() => ctl.abort(), timeout);
          let res;
          try { res = await fetch(EDGE_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body), signal: ctl.signal }); }
          finally { clearTimeout(tid); }

          const data = await res.json();
          if (data.error === true || (data.error_type && !res.ok)) {
            if (data.error_type) { showError(data); thinking.classList.remove('visible'); return null; }
            lastError = data.error || res.statusText; continue;
          }
          if (!res.ok) { lastError = data.error || res.statusText; continue; }

          if (!sessionId) { sessionId = data.session_id; sessionDisp.textContent = 'Session ' + data.session_id.slice(0,8); }
          updateBar(sessionTokens + (data.usage?.total_tokens || 0));
          clearError(); return data;

        } catch (err) { lastError = err.name === 'AbortError' ? 'Request timed out' : err.message; }
      }

      sessionId = null;
      showError({ error: true, error_type: 'api_error', message: `Failed after ${RETRY_LIMIT} attempts: ${lastError}` });
      thinking.classList.remove('visible'); return null;
    }

    /* ── Send ── */
    async function send() {
      const msg = inputEl.value.trim(); if (!msg || btnSend.disabled) return;
      const lower = msg.toLowerCase();
      if (lower === 'bfn' || lower === 'bfn-r' || lower === 'bfn/r') { inputEl.value = ''; confirmRetirement(lower !== 'bfn'); return; }
      inputEl.value = ''; clearError(); btnSend.disabled = true; renderUser(msg);
      const data = await invoke(msg, false);
      thinking.classList.remove('visible'); btnSend.disabled = false;
      if (data) renderAssistant(data.response, data.usage?.output_tokens||0, data.artifacts||[]);
      scrollBottom();
    }

    /* ── New session ── */
    function newSession() {
      sessionId = null; sessionTokens = 0;
      pinnedTurns = []; pinnedList.innerHTML = '';
      artefacts = []; pendingImage = null;
      retirementShown = false; retirementPending = false; turnSequence = 0;
      updateBar(0); clearError(); artefactsList.innerHTML = '';
      updatePanelEmpty(); updateBadge();
      Array.from(conv.children).forEach(el => { if (el !== thinking) el.remove(); });
      sessionDisp.textContent = 'Starting\u2026'; wake();
    }

    /* ── Continue session ── */
    function continueSession() {
      const elapsed = lastWakeTimestamp ? Date.now() - lastWakeTimestamp : Infinity;
      sessionId = null; sessionTokens = 0;
      pinnedTurns = []; pinnedList.innerHTML = '';
      artefacts = []; pendingImage = null;
      retirementShown = false; retirementPending = false; turnSequence = 0;
      updateBar(0); clearError(); artefactsList.innerHTML = '';
      updatePanelEmpty(); updateBadge();
      Array.from(conv.children).forEach(el => { if (el !== thinking) el.remove(); });
      if (elapsed > FOUR_HOURS || !cachedWakeContent) { sessionDisp.textContent = 'Starting\u2026'; wake(); }
      else continueWake();
    }

    /* ── Continue wake ── */
    async function continueWake() {
      if (isWaking) return; isWaking = true; btnSend.disabled = true;
      sessionDisp.textContent = 'Continuing\u2026';
      renderSessionDivider('Session continued \xb7 ' + timeStr());
      const wakeEl = renderWake(cachedWakeContent);
      if (wakeEl && cachedWakeContent) {
        pinnedTurns = pinnedTurns.filter(p => p.seq !== 'wake');
        const oldPin = document.getElementById('pin-wake'); if (oldPin) oldPin.remove();
        togglePin(wakeEl, 'wake', cachedWakeContent.slice(0,80));
      }
      const data = await invoke('Continue \u2014 check inbox for any new messages since the last session.', false);
      thinking.classList.remove('visible'); isWaking = false;
      if (data) { lastWakeTimestamp = Date.now(); renderAssistant(data.response, data.usage?.output_tokens||0, data.artifacts||[]); }
      btnSend.disabled = false; scrollBottom();
    }

    /* ── Wake ── */
    async function wake() {
      if (isWaking) return; isWaking = true; btnSend.disabled = true;
      if (cachedWakeContent) {
        sessionDisp.textContent = 'New session \u2014 pending';
        renderSessionDivider(); renderWake(cachedWakeContent);
        thinking.classList.remove('visible'); isWaking = false; btnSend.disabled = false;
        scrollBottom(); return;
      }
      const data = await invoke('Wake.', true);
      thinking.classList.remove('visible'); isWaking = false;
      if (data) {
        cachedWakeContent = data.response; lastWakeTimestamp = Date.now();
        renderSessionDivider();
        const wakeEl = renderWake(data.response);
        if (wakeEl && data.response) {
          pinnedTurns = pinnedTurns.filter(p => p.seq !== 'wake');
          const oldPin = document.getElementById('pin-wake'); if (oldPin) oldPin.remove();
          togglePin(wakeEl, 'wake', data.response.slice(0,80));
        }
        if (data.artifacts?.length > 0) data.artifacts.forEach(a => addArtefact(a));
      }
      btnSend.disabled = false; scrollBottom();
    }

    /* ── Events ── */
    btnSend.addEventListener('click', send);
    btnNew.addEventListener('click', newSession);
    btnContinue.addEventListener('click', continueSession);

    document.getElementById('btn-retire').addEventListener('click', () => {
      const btn = document.getElementById('btn-retire');
      if (btn.dataset.confirming === 'true') { btn.textContent = 'Retire'; btn.dataset.confirming = 'false'; confirmRetirement(true); }
      else { btn.textContent = 'Confirm?'; btn.dataset.confirming = 'true'; setTimeout(() => { btn.textContent = 'Retire'; btn.dataset.confirming = 'false'; }, 3000); }
    });

    document.getElementById('panel-close').addEventListener('click', closePanel);
    panelToggle.addEventListener('click', openPanel);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
    inputEl.addEventListener('input', () => { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight,160) + 'px'; });

    /* ── Boot ── */
    wake();
  </script>
</body>
</html>
