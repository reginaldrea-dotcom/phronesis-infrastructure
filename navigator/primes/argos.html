<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argos — Phronesis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="preload" href="prime-core.v1.css" as="style">
  <link rel="stylesheet" href="prime-core.v1.css">
</head>
<body>
  <div class="shell">
    <div class="nav-strip">
      <a id="nav-link" href="#" class="nav-link"
         onclick="var u=document.getElementById('nav-link').href; if(u&&u!==location.href+'#'&&u!=='#')window.open(u,'_blank','noopener'); return false;">
        <span class="nav-icon"></span><span>Navigator</span>
      </a>
      <a href="https://claude.ai/projects" class="nav-link"
         onclick="window.open('https://claude.ai/projects','_blank','noopener'); return false;">
        Claude Projects
      </a>
    </div>
    <div class="main">
      <div class="left-col">
        <div class="header">
          <div class="header-row">
            <div class="prime-identity">
              <div class="prime-icon" id="prime-icon"></div>
              <div><div class="prime-name" id="prime-name"></div><div class="prime-role" id="prime-role"></div></div>
            </div>
            <div class="session-meta">
              <div id="session-display">Starting…</div>
              <div id="instance-display" style="color:var(--text-light)">—</div>
              <div id="date-display"></div>
            </div>
          </div>
          <div class="token-bar-wrap">
            <div class="token-bar-track"><div class="token-bar-fill" id="token-bar-fill"></div></div>
            <div class="token-bar-label" id="token-bar-label">Waking…</div>
          </div>
        </div>
        <div class="conversation" id="conversation"><div class="thinking visible" id="thinking"></div></div>
        <div class="input-area">
          <div class="image-preview" id="image-preview">
            <img id="preview-img" src="" alt="">
            <span class="image-preview-name" id="preview-name"></span>
            <button class="btn-remove-image" id="btn-remove-image">×</button>
          </div>
          <div class="input-row">
            <button class="btn-attach" id="btn-attach" title="Attach image">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13.5 7.5L7 14a4 4 0 01-5.657-5.657l7-7a2.5 2.5 0 013.535 3.536L5.5 11.5a1 1 0 01-1.414-1.414L10 4"/>
              </svg>
            </button>
            <input type="file" id="file-input" accept="image/*,application/pdf">
            <textarea id="input" rows="3"></textarea>
          </div>
          <div class="input-controls">
            <button class="btn btn-new-session" id="btn-new-session">New Session</button>
            <button class="btn btn-new-session" id="btn-continue">Continue</button>
            <button class="btn btn-new-session" id="btn-retire">Retire</button>
+            <button class="btn btn-send" id="btn-stop" style="display:none">Stop</button>
             <button class="btn btn-send" id="btn-send" disabled>Send</button>
          </div>
          <div class="error-state" id="error-state"></div>
        </div>
        <div class="panel-toggle" id="panel-toggle">Artefacts<span class="panel-badge" id="panel-badge"></span></div>
      </div>
      <div class="artefact-panel closed" id="artefact-panel">
        <div class="panel-header">
          <span class="panel-label">Artefacts</span>
          <button class="panel-close" id="panel-close">×</button>
        </div>
        <div class="panel-scroll">
          <div id="panel-pinned-section" style="display:none">
            <div class="panel-section-label">Held in context</div>
            <div id="panel-pinned-list"></div>
          </div>
          <div id="panel-artefacts-section" style="display:none">
            <div class="panel-section-label">This session</div>
            <div id="panel-artefacts-list"></div>
          </div>
          <div class="panel-empty" id="panel-empty">Nothing here yet.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modular JS — load order: config → state → mst → gauge → render → hold → panel → session → init -->
  <script src="argos-config.js"></script>
  <script src="argos-state.js"></script>
  <script src="argos-mst.js"></script>
  <script src="argos-gauge.js"></script>
  <script src="argos-render.js"></script>
  <script src="argos-hold.js"></script>
  <script src="argos-panel.js"></script>
  <script src="argos-session.js"></script>
  <script src="argos-init.js"></script>
</body>
</html>
