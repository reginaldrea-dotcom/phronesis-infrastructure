    /* ── Helpers ── */
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    /* ── Supabase REST ── */
    async function supabaseRest(method, table, params, body) {
      const url = new URL(`${PRIME_CONFIG.supabaseUrl}/rest/v1/${table}`);
      if (params) Object.entries(params).forEach(([k,v]) => url.searchParams.append(k, v));
      const headers = { 'apikey': PRIME_CONFIG.supabaseKey };
      if (body) headers['Content-Type'] = 'application/json';
      if (method === 'POST' || method === 'PATCH') headers['Prefer'] = 'return=representation';
      const opts = { method, headers };
      if (body) opts.body = JSON.stringify(body);
      try {
        const res = await fetch(url.toString(), opts);
        if (!res.ok) return null;
        const text = await res.text();
        return text ? JSON.parse(text) : [];
      } catch { return null; }
    }

    /* ── MST content helpers ── */
    function parseMst(content) {
      const csIdx = content.indexOf('CURRENT STATE');
      const alIdx = content.indexOf('AMENDMENTS LOG');
      const csText = (csIdx !== -1 && alIdx !== -1)
        ? content.slice(csIdx + 'CURRENT STATE'.length, alIdx).replace(/^\n+/,'').trim()
        : (csIdx !== -1 ? content.slice(csIdx + 'CURRENT STATE'.length).replace(/^\n+/,'').trim() : '');
      const alText = alIdx !== -1
        ? content.slice(alIdx + 'AMENDMENTS LOG'.length).replace(/^\n+/,'').trim()
        : '';
      const entries = alText ? alText.split(/\n{2,}/).filter(e => e.trim()).slice(-3) : [];
      return { currentState: csText, amendments: entries };
    }

    function assembleMstContent(q1, q2, q3, q4) {
      return 'REASONING MEMBRANE\n\n' + (q1||'').trim() + '\n\n' + (q2||'').trim() + '\n\n' + (q3||'').trim() +
             '\n\nCURRENT STATE\n\n' + (q4||'').trim() + '\n\nAMENDMENTS LOG\n';
    }

    function updateMstContent(existing, newCurrentState, dateEntry) {
      let c = existing;
      const csIdx = c.indexOf('CURRENT STATE');
      const alIdx = c.indexOf('AMENDMENTS LOG');
      if (csIdx !== -1 && alIdx !== -1) {
        c = c.slice(0, csIdx) + 'CURRENT STATE\n\n' + newCurrentState.trim() + '\n\n' + c.slice(alIdx);
      }
      return c.trimEnd() + '\n\n' + dateEntry + '\n';
    }

    function extractCurrentState(entry) {
      const clean = entry.replace(/^(WORLD-STATE UPDATE|REASONING REVISION):\s*/i,'').trim();
      const nsIdx = clean.toLowerCase().indexOf('next step');
      if (nsIdx !== -1) {
        const end = clean.indexOf('\n', nsIdx);
        return clean.slice(0, end !== -1 ? end : undefined).trim();
      }
      return ((clean.match(/[^.!?]+[.!?]+/g) || [clean]).slice(0,2)).join(' ').trim();
    }

    /* ── Hold-this: trigger ── */
    async function triggerHoldThis(art, btnEl) {
      const orig = btnEl.textContent;
      btnEl.textContent = 'Checking\u2026'; btnEl.disabled = true;

      const domain = art.title || '';
      let existingMst = null;
      const rows = await supabaseRest('GET', 'artifacts', {
        'artifact_type':     'eq.MST',
        'metadata->>status': 'eq.active',
        'metadata->>domain': `eq.${domain}`,
        'select': 'id,content,metadata',
        'limit':  '1',
      });
      if (rows && rows.length > 0) existingMst = rows[0];

      btnEl.textContent = orig; btnEl.disabled = false;

      if (existingMst) openHoldAmend(domain, existingMst);
      else             openHoldCreate(domain);
    }

    /* ── Hold-this: CREATE modal (simplified per Eames brief)
         Domain always visible. Notes section (work ref + Q1-Q4) collapsed by default.
         Reg just types domain and clicks Hold this. Primes expand notes to fill detail. ── */
    function openHoldCreate(domainSuggestion) {
      const ex = document.getElementById('hold-modal-overlay');
      if (ex) ex.remove();

      const prompts = HOLD_PROMPTS.code;
      const fieldsHtml = prompts.map((p,i) =>
        `<div class="hold-field-group">` +
        `<label class="hold-field-label">${esc(p.label)}</label>` +
        `<div class="hold-field-hint">${esc(p.hint)}</div>` +
        `<textarea id="hq${i}" rows="3" placeholder="${esc(p.placeholder)}"></textarea>` +
        `</div>`
      ).join('');

      const overlay = document.createElement('div');
      overlay.id = 'hold-modal-overlay';
      overlay.className = 'inspect-modal-overlay';
      overlay.innerHTML =
        `<div class="hold-modal">` +
        `<div class="hold-modal-head">` +
        `<div class="hold-modal-title">Hold this \u2014 new</div>` +
        `<div class="hold-modal-subtitle">No existing membrane found for this domain</div>` +
        `</div>` +
        `<div class="hold-modal-body">` +

        /* Domain — always visible, prominent */
        `<div class="hold-field-group" style="margin-bottom:18px">` +
        `<label class="hold-field-label">Domain name</label>` +
        `<input type="text" id="h-domain" value="${esc(domainSuggestion)}" placeholder="e.g. argos.html \u2014 auth flow">` +
        `</div>` +

        /* Toggle for notes */
        `<div class="hold-notes-toggle" id="h-notes-toggle">` +
        `<span class="hold-notes-arrow" id="h-notes-arrow">\u25b6</span>` +
        `<span>Add membrane notes</span>` +
        `</div>` +

        /* Collapsible: work reference + Q1–Q4 */
        `<div class="hold-notes-section" id="h-notes-section">` +
        `<div class="hold-field-group" style="margin-top:10px">` +
        `<label class="hold-field-label">Work reference <span class="hold-tag">optional</span></label>` +
        `<input type="text" id="h-ref" placeholder="Artifact ID, path, or URL">` +
        `</div>` +
        fieldsHtml +
        `</div>` +

        `</div>` +
        `<div class="hold-modal-foot">` +
        `<button class="hold-btn-cancel" id="h-cancel">Cancel</button>` +
        `<button class="hold-btn-primary" id="h-submit">Hold this</button>` +
        `</div></div>`;

      /* Toggle behaviour */
      const toggleBtn  = overlay.querySelector('#h-notes-toggle');
      const arrow      = overlay.querySelector('#h-notes-arrow');
      const notesSection = overlay.querySelector('#h-notes-section');
      toggleBtn.addEventListener('click', () => {
        const isOpen = notesSection.classList.contains('open');
        notesSection.classList.toggle('open', !isOpen);
        arrow.classList.toggle('open', !isOpen);
      });

      overlay.querySelector('#h-cancel').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector('#h-submit').addEventListener('click', async () => {
        const domain  = (document.getElementById('h-domain')?.value||'').trim();
        const workRef = (document.getElementById('h-ref')?.value||'').trim();
        const answers = prompts.map((_,i) => (document.getElementById(`hq${i}`)?.value||'').trim());
       if (!domain) { alert('Domain name is required.'); return; }
if (!answers[0]) {
  notesSection.classList.add('open');
  arrow.classList.add('open');
  showHoldError(overlay, 'Please describe what you examined and concluded before saving.');
  return;
}
await commitHoldCreate(overlay, domain, workRef, answers);
      });
      document.body.appendChild(overlay);

      /* Focus domain field */
      setTimeout(() => overlay.querySelector('#h-domain')?.select(), 50);
    }

    /* ── Hold-this: AMEND modal ── */
    function openHoldAmend(domain, existingMst) {
      const ex = document.getElementById('hold-modal-overlay');
      if (ex) ex.remove();

      const parsed      = parseMst(existingMst.content || '');
      const lastTouched = existingMst.metadata?.last_touched || 'previously';

      const amendmentsHtml = parsed.amendments.length > 0
        ? parsed.amendments.map(entry => {
            const isW = /WORLD-STATE UPDATE/i.test(entry);
            const isR = /REASONING REVISION/i.test(entry);
            const badge = isW ? `<span class="hold-type-badge world">World-state</span>`
                        : isR ? `<span class="hold-type-badge revision">Reasoning revision</span>` : '';
            return `<div class="hold-amend-entry">${badge}${esc(entry)}</div>`;
          }).join('')
        : `<div class="hold-amend-entry" style="color:var(--text-light);font-style:italic">No amendments yet.</div>`;

      const overlay = document.createElement('div');
      overlay.id = 'hold-modal-overlay';
      overlay.className = 'inspect-modal-overlay';
      overlay.innerHTML =
        `<div class="hold-modal">` +
        `<div class="hold-modal-head"><div class="hold-modal-title">Amend</div>` +

        `<div class="hold-amend-display">` +
        `<span class="hold-amend-label">Current state</span>` +
        `<div class="hold-amend-current">${esc(parsed.currentState || 'No current state recorded.')}</div>` +
        `<span class="hold-amend-log-label">Recent amendments</span>` +
        amendmentsHtml + `</div>` +
        `<div class="hold-field-group">` +

        `<div class="hold-date-prelabel"><span class="hold-date-str">${esc(todayStr())}</span>` +
        `<span class="hold-field-hint" style="margin:0"> \u2014 type (WORLD-STATE UPDATE or REASONING REVISION), what changed, status, next step</span></div>` +
        `<textarea id="h-amend-entry" rows="5" placeholder="WORLD-STATE UPDATE: \u2026 Status: active \u2192 paused. Next step: \u2026"></textarea>` +
        `</div></div>` +
        `<div class="hold-modal-foot">` +
        `<button class="hold-btn-cancel" id="h-cancel">Cancel</button>` +
        `<button class="hold-btn-primary" id="h-submit">Amend</button>` +
        `</div></div>`;

      overlay.querySelector('#h-cancel').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector('#h-submit').addEventListener('click', async () => {
        const entry = (document.getElementById('h-amend-entry')?.value||'').trim();
        if (!entry) return;
        await commitHoldAmend(overlay, existingMst, entry);
      });
      document.body.appendChild(overlay);
    }
function mstTitle(domain) {
  const slug = domain.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_|_$/g, '').slice(0, 48);
  const d = new Date();
  const mon = d.toLocaleString('en-GB', { month: 'short' });
  return `MST_${slug}_${mon}${d.getFullYear()}`;
}
    /* ── Hold-this: commit CREATE ── */
    async function commitHoldCreate(overlay, domain, workRef, answers) {
  const btn = overlay.querySelector('#h-submit');
  btn.textContent = 'Saving\u2026'; btn.disabled = true;
  const content = assembleMstContent(answers[0], answers[1], answers[2], answers[3]);
  const metadata = {
    domain, prime_lineage: PRIME_CONFIG.lineage,
    status: 'active', domain_type: 'code',
    work_reference: workRef || null,
    last_touched: new Date().toISOString().slice(0, 10),
  };
  try {
    const res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'hold_this',
        lineage_name: PRIME_CONFIG.lineage,
        hold_this_payload: {
  mode: 'create',
  instance_id: PRIME_CONFIG.instanceId,
  title: mstTitle(domain),
  content,
  metadata,
},
      }),
    });
    const result = await res.json();
    if (result.id) {
      overlay.remove();
      showHoldConfirm('Membrane held.', result.id);
    } else {
      btn.textContent = 'Hold this'; btn.disabled = false;
      showHoldError(overlay, result.message || 'Could not save. Please try again.');
    }
  } catch (err) {
    btn.textContent = 'Hold this'; btn.disabled = false;
    showHoldError(overlay, 'Network error. Please try again.');
  }
}

     
    /* ── Hold-this: commit AMEND ── */
    async function commitHoldAmend(overlay, existingMst, newEntry) {
  const btn = overlay.querySelector('#h-submit');
  btn.textContent = 'Saving\u2026'; btn.disabled = true;
  const dateEntry = `[${todayStr()}]\n${newEntry}`;
  const newCurrentState = extractCurrentState(newEntry);
  const updatedContent = updateMstContent(existingMst.content || '', newCurrentState, dateEntry);
  const updatedMetadata = { ...(existingMst.metadata || {}), last_touched: new Date().toISOString().slice(0, 10) };
  try {
    const res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'hold_this',
        lineage_name: PRIME_CONFIG.lineage,
        hold_this_payload: {
          mode: 'amend',
          id: existingMst.id,
          content: updatedContent,
          metadata: updatedMetadata,
        },
      }),
    });
    const result = await res.json();
    if (!result.error) {
      overlay.remove();
      showHoldConfirm('Amendment saved.', existingMst.id);
    } else {
      btn.textContent = 'Amend'; btn.disabled = false;
      showHoldError(overlay, result.message || 'Could not save. Please try again.');
    }
  } catch (err) {
    btn.textContent = 'Amend'; btn.disabled = false;
    showHoldError(overlay, 'Network error. Please try again.');
  }
}

    function showHoldConfirm(message, artifactId) {
      const d = document.createElement('div');
      d.className = 'retirement-prompt'; d.style.cssText = 'padding:6px 0;margin-bottom:4px;';
      d.innerHTML = `<div class="retirement-dot" style="background:var(--bar-green)"></div>` +
        `<div class="retirement-text">${esc(message)}${artifactId ? ' \xb7 ' + String(artifactId).slice(0,8) : ''}</div>`;
      insertBefore(d); setTimeout(() => d.remove(), 6000); scrollBottom();
    }

    function showHoldError(overlay, message) {
      let err = overlay.querySelector('.hold-err');
      if (err) err.remove();
      err = document.createElement('div'); err.className = 'hold-err';
      err.style.cssText = 'margin:8px 22px 0;padding:8px 12px;background:rgba(139,48,32,0.06);border-left:2.5px solid var(--bar-red);border-radius:2px;font-family:\'Cormorant Garamond\',Georgia,serif;font-size:12px;color:var(--bar-red);line-height:1.5;';
      err.textContent = message;
      overlay.querySelector('.hold-modal').insertBefore(err, overlay.querySelector('.hold-modal-foot'));
    }

    /* ── Working budget gauge (Napoleon D2.4)
         orientationCost  = input tokens consumed at wake (system prompt + Super-T + preloads)
         Working budget   = 1M context window - orientationCost
         Gauge shows remaining working budget. Starts full after wake, depletes with conversation.
         Green > 50%, amber 30–50%, red < 30%.
    ── */
    function getInputTokens(usage) {
  if (!usage) return 0;
  // Use total_input_tokens if available (uncached + cache_creation + cache_read)
  if (usage.total_input_tokens != null) return usage.total_input_tokens;
  // Sum components if returned separately
  const uncached    = usage.input_tokens          ?? 0;
  const cacheCreate = usage.cache_creation_tokens ?? 0;
  const cacheRead   = usage.cache_read_tokens     ?? 0;
  if (uncached + cacheCreate + cacheRead > 0) return uncached + cacheCreate + cacheRead;
  // Last resort
  return Math.max(0, (usage.total_tokens || 0) - (usage.output_tokens || 0));
}

    function captureOrientationCost(usage) {
      orientationCost      = getInputTokens(usage);
      currentContextTokens = orientationCost;
      renderBudgetGauge();
    }

    function updateBudgetGauge(usage) {
  if (usage) currentContextTokens += (usage.output_tokens || 0);
  renderBudgetGauge();
}

    function renderBudgetGauge() {
      if (!orientationCost) {
        tokenFill.style.width = '0%';
        tokenLabel.textContent = 'Waking\u2026';
        tokenLabel.className   = 'token-bar-label';
        return;
      }

      const workingBudget = Math.max(1, PRIME_CONFIG.sessionBudget - orientationCost);
      const conversationUsed = Math.max(0, currentContextTokens - orientationCost);
      const remainingTokens  = Math.max(0, workingBudget - conversationUsed);
      const remainingPct     = Math.min(100, (remainingTokens / workingBudget) * 100);

      tokenFill.style.width = remainingPct + '%';

      let colour, labelClass;
      if (remainingPct > 50)      { colour = 'var(--bar-green)'; labelClass = ''; }
      else if (remainingPct > 30) { colour = 'var(--bar-amber)'; labelClass = 'amber'; }
      else                        { colour = 'var(--bar-red)';   labelClass = 'red'; }
      tokenFill.style.background = colour;

      const remainK = Math.round(remainingTokens / 1000);
      const budgetK = Math.round(workingBudget / 1000);
      tokenLabel.textContent = `~${remainK}K of ${budgetK}K working budget`;
      tokenLabel.className   = 'token-bar-label' + (labelClass ? ' ' + labelClass : '');

      if (remainingPct <= 30 && !retirementShown) {
        retirementShown = true;
        renderRetirementPrompt();
      }
    }

    function resetGauge() {
      orientationCost      = 0;
      currentContextTokens = 0;
      tokenFill.style.width      = '0%';
      tokenFill.style.background = 'var(--bar-green)';
      tokenLabel.textContent     = 'Waking\u2026';
      tokenLabel.className       = 'token-bar-label';
    }

    /* ── Render helpers ── */
    function renderSessionDivider(label) {
      const d = document.createElement('div'); d.className = 'session-divider';
      d.innerHTML = `<span>${esc(label || 'Session opened \xb7 ' + timeStr())}</span>`;
      insertBefore(d);
    }

    function renderWake(text) {
      const label = text ? 'Wake \xb7 Orientation complete' : 'Wake \xb7 Orientation incomplete \u2014 check substrate';
      const d = document.createElement('div'); d.className = 'turn-wake';
      d.innerHTML = `<div class="turn-label">${esc(label)}</div><div class="turn-content">${esc(text || 'No orientation data returned.')}</div>`;
      insertBefore(d); return d;
    }

    function renderUser(text) {
      const d = document.createElement('div'); d.className = 'turn-user';
      d.innerHTML = `<div class="turn-label">Reg <span class="turn-time">${timeStr()}</span></div><div class="turn-content">${esc(text)}</div>`;
      insertBefore(d);
    }

    function renderAssistant(text, tokens, arts) {
      const seq = ++turnSequence; const excerpt = text.trim().slice(0,200);
      const d = document.createElement('div'); d.className = 'turn-assistant'; d.dataset.seq = seq;
      let artsHtml = '';
      if (arts && arts.length > 0) artsHtml = arts.map(a => `<div class="artefact-ref">&#128206; ${esc(a.title)} \u2014 in artefact panel</div>`).join('');
      d.innerHTML =
        `<button class="pin-btn" title="Pin turn">\u2385</button>` +
        `<div class="turn-label">${esc(PRIME_CONFIG.name)} <span style="font-weight:400;margin-left:8px;font-size:11px;opacity:0.7">${timeStr()}</span></div>` +
        `<div class="turn-content">${esc(text)}</div>` + artsHtml +
        `<div class="turn-tokens">${(tokens||0).toLocaleString()} tokens</div>`;
      d.querySelector('.pin-btn').addEventListener('click', () => togglePin(d, seq, excerpt));
      insertBefore(d);
      if (arts && arts.length > 0) { arts.forEach(a => addArtefact(a)); openPanel(); }
      return d;
    }

    function renderRetirementPrompt() {
      if (document.getElementById('retirement-prompt')) return;
      const d = document.createElement('div'); d.className = 'retirement-prompt'; d.id = 'retirement-prompt';
      d.innerHTML = `<div class="retirement-dot"></div><div class="retirement-text">Ready to retire when you are.</div>`;
      insertBefore(d); scrollBottom();
    }

    function confirmRetirement(rich) {
      if (retirementPending) return; retirementPending = true;
      const d = document.createElement('div'); d.className = 'retirement-prompt'; d.id = 'retirement-confirm-prompt';
      d.innerHTML =
        `<div class="retirement-dot"></div>` +
        `<div class="retirement-text">Retire ${esc(PRIME_CONFIG.name)} and write the Super-T?</div>` +
        `<button class="btn btn-send" id="btn-confirm-retire" style="margin-left:12px;padding:4px 14px;font-size:12px">Confirm</button>` +
        `<button class="error-dismiss" id="btn-cancel-retire" style="margin-left:6px">Cancel</button>`;
      insertBefore(d); scrollBottom();
      document.getElementById('btn-confirm-retire').addEventListener('click', () => { d.remove(); retirementPending = false; triggerRetirement(rich); });
      document.getElementById('btn-cancel-retire').addEventListener('click',  () => { d.remove(); retirementPending = false; });
    }

    /* ── Inspect modal ── */
    function openInspectModal(title, content, footerConfig) {
      const ex = document.getElementById('inspect-modal-overlay'); if (ex) ex.remove();
      const overlay = document.createElement('div');
      overlay.id = 'inspect-modal-overlay'; overlay.className = 'inspect-modal-overlay';
      const footerHtml = footerConfig.map((btn,i) =>
        `<button class="${esc(btn.className||'btn-artefact')}" data-fi="${i}">${esc(btn.label)}</button>`).join('');
      overlay.innerHTML =
        `<div class="inspect-modal">` +
        `<div class="inspect-modal-header"><span class="inspect-modal-title">${esc(title)}</span><button class="inspect-modal-close">\u00d7</button></div>` +
        `<div class="inspect-modal-body"><pre class="inspect-modal-content">${esc(content)}</pre></div>` +
        `<div class="inspect-modal-footer">${footerHtml}</div></div>`;
      overlay.querySelector('.inspect-modal-close').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      footerConfig.forEach((btn,i) => overlay.querySelector(`[data-fi="${i}"]`).addEventListener('click', () => btn.action(overlay)));
      document.body.appendChild(overlay);
    }

    /* ── Error states ── */
    function showError(data) {
      clearError(); errorState.className = 'error-state visible'; btnSend.disabled = true;
      if (data.error_type === 'rate_limit_exceeded') {
        errorState.classList.add('rate-limit');
        let secs = data.retry_after_seconds || 30;
        errorState.innerHTML = `<div>${esc(data.message)}</div><div class="error-countdown" id="err-cd">Ready in ${secs}s</div>`;
        countdownInterval = setInterval(() => {
          secs--; const el = document.getElementById('err-cd');
          if (el) el.textContent = secs > 0 ? `Ready in ${secs}s` : 'Ready';
          if (secs <= 0) { clearError(); btnSend.disabled = false; }
        }, 1000);
      } else if (data.error_type === 'context_exceeded') {
        errorState.classList.add('ctx-exceeded');
        errorState.innerHTML = `<div>${esc(data.message)}</div><button class="btn btn-new-session error-dismiss" onclick="newSession()">New Session</button>`;
      } else {
        errorState.classList.add('api-error');
        const rid = data.request_id ? `<div class="error-countdown">${esc(data.request_id)}</div>` : '';
        errorState.innerHTML = `<div>${esc(data.message||data.error||'Something went wrong.')}</div>${rid}<button class="error-dismiss" onclick="clearError();document.getElementById('btn-send').disabled=false;">Dismiss</button>`;
      }
    }

    function clearError() {
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
      errorState.className = 'error-state'; errorState.innerHTML = '';
    }

    /* ── Panel ── */
    function openPanel()  { panelEl.classList.remove('closed'); panelToggle.classList.remove('visible'); }
    function closePanel() { panelEl.classList.add('closed');    panelToggle.classList.add('visible');    updateBadge(); }
    function updateBadge() {
      const n = artefacts.length + pinnedTurns.length;
      if (n > 0) { panelBadge.textContent = n; panelBadge.classList.add('visible'); }
      else panelBadge.classList.remove('visible');
    }
    function updatePanelEmpty() {
      const has = artefacts.length > 0 || pinnedTurns.length > 0;
      panelEmpty.style.display       = has ? 'none' : 'block';
      artefactsSection.style.display = artefacts.length > 0 ? 'block' : 'none';
      pannedSection.style.display    = pinnedTurns.length > 0 ? 'block' : 'none';
    }

    /* ── Add artefact ── */
    function addArtefact(art) {
      const existing = artefacts.filter(a => a.title === art.title).length;
      const version  = existing + 1;
      const entry    = { ...art, version, time: timeStr() };
      artefacts.push(entry);
      const idx = artefacts.length - 1;

      const el = document.createElement('div'); el.className = 'artefact-entry';
      el.innerHTML =
        `<div class="artefact-title">${esc(art.title)}</div>` +
        `<div class="artefact-meta">${esc(art.type||'code')} \xb7 ${entry.time}${version > 1 ? ' \xb7 v'+version : ''}</div>` +
        `<div class="artefact-actions">` +
        `<button class="btn-artefact hold"    data-action="hold"    data-idx="${idx}">Hold this</button>` +
        `<button class="btn-artefact"         data-action="inspect" data-idx="${idx}">Inspect</button>` +
        `<button class="btn-artefact"         data-action="copy"    data-idx="${idx}">Copy</button>` +
        `<button class="btn-artefact"         data-action="dismiss" data-idx="${idx}">Dismiss</button>` +
        `</div>`;

      el.addEventListener('click', e => {
        const btn = e.target.closest('[data-action]'); if (!btn) return;
        const i = parseInt(btn.dataset.idx); const storedArt = artefacts[i];

        if (btn.dataset.action === 'hold') {
          if (!storedArt) return;
          triggerHoldThis(storedArt, btn);

        } else if (btn.dataset.action === 'inspect') {
          if (!storedArt) return;
          const content = storedArt.content || '';
          openInspectModal(storedArt.title, content, [
            { label: 'Open in tab', className: 'btn-artefact', action: () => { const b = new Blob([content],{type:'text/plain'}); window.open(URL.createObjectURL(b),'_blank','noopener'); }},
            { label: 'Copy',        className: 'btn-artefact', action: (ov) => { navigator.clipboard.writeText(content).catch(()=>{}); ov.remove(); }},
            { label: 'Close',       className: 'btn-artefact', action: (ov) => ov.remove() },
          ]);

        } else if (btn.dataset.action === 'copy') {
          navigator.clipboard.writeText(storedArt?.content||'').then(() => {
            btn.textContent = 'Copied \u2713'; setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
          }).catch(()=>{});

        } else if (btn.dataset.action === 'dismiss') {
          artefacts.splice(i, 1);
          el.style.cssText = 'opacity:0;max-height:0;overflow:hidden;transition:opacity 0.2s,max-height 0.2s';
          setTimeout(() => el.remove(), 200);
          updatePanelEmpty(); updateBadge();
        }
      });

      artefactsList.appendChild(el);
      updatePanelEmpty(); updateBadge();
    }

    /* ── Pin ── */
    function togglePin(turnEl, seq, excerpt) {
      if (turnEl.classList.contains('pinned')) {
        turnEl.classList.remove('pinned');
        pinnedTurns = pinnedTurns.filter(p => p.seq !== seq);
        const pe = document.getElementById('pin-' + seq); if (pe) pe.remove();
      } else {
        const turnTime = turnEl.querySelector('.turn-label span')?.textContent?.trim() || '';
        turnEl.classList.add('pinned');
        pinnedTurns.push({ seq, excerpt, el: turnEl });
        const pe = document.createElement('div'); pe.className = 'pinned-entry'; pe.id = 'pin-' + seq;
        pe.innerHTML = `<span class="pinned-icon">\u2385</span><span class="pinned-excerpt">${esc(excerpt)}\u2026</span>`;
        pe.addEventListener('click', () => {
          const fullContent = turnEl.querySelector('.turn-content')?.textContent || excerpt;
          const modalTitle  = seq === 'wake'
            ? `Wake orientation \u2014 ${PRIME_CONFIG.name}`
            : `Pinned turn \u2014 ${PRIME_CONFIG.name}${turnTime ? ', '+turnTime : ''}`;
          openInspectModal(modalTitle, fullContent, [
            { label: 'Release pin', className: 'btn-artefact', action: (ov) => { ov.remove(); togglePin(turnEl, seq, excerpt); }},
            { label: 'Close',       className: 'btn-artefact', action: (ov) => ov.remove() },
          ]);
        });
        pinnedList.appendChild(pe); openPanel();
      }
      updateThinking(); updatePanelEmpty(); updateBadge();
    }

    function updateThinking() {
      const n = pinnedTurns.length;
      const base = isWaking ? `${PRIME_CONFIG.name} is waking\u2026` : `${PRIME_CONFIG.name} is thinking\u2026`;
      thinking.textContent = n > 0 ? `${PRIME_CONFIG.name} is thinking\u2026 holding ${n} pinned turn${n!==1?'s':''}` : base;
    }

    /* ── Image handling ── */
    document.getElementById('btn-attach').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const b64 = ev.target.result.split(',')[1];
    if (file.type.startsWith('image/')) {
      pendingImage = { data: b64, media_type: file.type };
      pendingFile = null;
      previewImg.src = ev.target.result;
      previewImg.style.display = '';
    } else {
      pendingFile = { data: b64, media_type: file.type, name: file.name };
      pendingImage = null;
      previewImg.src = '';
      previewImg.style.display = 'none';
    }
    previewName.textContent = file.name;
    imgPreview.classList.add('visible');
  };
  reader.readAsDataURL(file); fileInput.value = '';
});

document.getElementById('btn-remove-image').addEventListener('click', () => {
  pendingImage = null; pendingFile = null;
  imgPreview.classList.remove('visible');
  previewImg.src = ''; previewImg.style.display = '';
});

    /* ── Retirement ── */
    async function triggerRetirement(rich) {
      renderUser(rich ? 'bfn-R' : 'bfn');
      inputEl.disabled = true; btnSend.disabled = true;
      const data = await invoke('', false, { retire: true, rich });
      thinking.classList.remove('visible');
      if (data) {
        renderAssistant(data.response, data.usage?.output_tokens||0, data.artifacts||[]);
        updateBudgetGauge(data.usage);
      }
      const d = document.createElement('div'); d.className = 'retirement-confirm';
      d.textContent = `Session closed. ${PRIME_CONFIG.name} will remember.`;
      insertBefore(d);
      const rp = document.getElementById('retirement-prompt'); if (rp) rp.remove();
      scrollBottom();
    }

    /* ── Invoke ── */
    async function invoke(message, isWake = false, opts = {}) {
      const pCount = pinnedTurns.length;
      thinking.textContent = isWake ? `${PRIME_CONFIG.name} is waking\u2026`
        : pCount > 0 ? `${PRIME_CONFIG.name} is thinking\u2026 holding ${pCount} pinned turn${pCount!==1?'s':''}`
        : `${PRIME_CONFIG.name} is thinking\u2026`;
      thinking.classList.add('visible'); scrollBottom();
      let lastError = null;

      for (let attempt = 0; attempt < RETRY_LIMIT; attempt++) {
        if (attempt > 0) {
          thinking.textContent = isWake ? `${PRIME_CONFIG.name} is waking\u2026 (retry ${attempt})` : `${PRIME_CONFIG.name} is thinking\u2026 (retry ${attempt})`;
          await sleep(RETRY_DELAY);
        }
        try {
          const body = {
            lineage_name: PRIME_CONFIG.lineage,
            user_message: message,
            pinned_turns: pinnedTurns.map(p => ({ role:'assistant', content: p.el.querySelector('.turn-content')?.textContent || p.excerpt })),
          };
          if (sessionId)    body.session_id = sessionId;
          if (opts.retire)  body.retire      = true;
          if (opts.rich)    body.rich        = true;
         if (pendingImage) {
  body.image = pendingImage; pendingImage = null;
  imgPreview.classList.remove('visible');
} else if (pendingFile) {
  body.file = pendingFile; pendingFile = null;
  imgPreview.classList.remove('visible');
}

          const ctl = new AbortController();
          const timeout = isWake ? 60000 : FETCH_TIMEOUT;
          const tid = setTimeout(() => ctl.abort(), timeout);
          let res;
          try { res = await fetch(EDGE_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body), signal: ctl.signal }); }
          finally { clearTimeout(tid); }

          const data = await res.json();
          if (data.error === true || (data.error_type && !res.ok)) {
            if (data.error_type) { showError(data); thinking.classList.remove('visible'); return null; }
            lastError = data.error || res.statusText; continue;
          }
          if (!res.ok) { lastError = data.error || res.statusText; continue; }

          if (!sessionId) { sessionId = data.session_id; sessionDisp.textContent = 'Session ' + data.session_id.slice(0,8); }
          clearError(); return data;

        } catch (err) { lastError = err.name === 'AbortError' ? 'Request timed out' : err.message; }
      }

      sessionId = null;
      showError({ error: true, error_type: 'api_error', message: `Failed after ${RETRY_LIMIT} attempts: ${lastError}` });
      thinking.classList.remove('visible'); return null;
    }

    /* ── Send ── */
    async function send() {
      const msg = inputEl.value.trim(); if (!msg || btnSend.disabled) return;
      const lower = msg.toLowerCase();
      if (lower === 'bfn' || lower === 'bfn-r' || lower === 'bfn/r') { inputEl.value = ''; confirmRetirement(lower !== 'bfn'); return; }
      inputEl.value = ''; clearError(); btnSend.disabled = true; renderUser(msg);
      const data = await invoke(msg, false);
      thinking.classList.remove('visible'); btnSend.disabled = false;
      if (data) {
        renderAssistant(data.response, data.usage?.output_tokens||0, data.artifacts||[]);
        updateBudgetGauge(data.usage);
      }
      scrollBottom();
    }

    /* ── New session ── */
    function newSession() {
      sessionId = null;
      pinnedTurns = []; pinnedList.innerHTML = '';
      artefacts = []; pendingImage = null;
      retirementShown = false; retirementPending = false; turnSequence = 0;
      resetGauge(); clearError(); artefactsList.innerHTML = '';
      updatePanelEmpty(); updateBadge();
      Array.from(conv.children).forEach(el => { if (el !== thinking) el.remove(); });
      sessionDisp.textContent = 'Starting\u2026'; wake();
    }

    /* ── Continue session ── */
    function continueSession() {
      const elapsed = lastWakeTimestamp ? Date.now() - lastWakeTimestamp : Infinity;
      sessionId = null;
      pinnedTurns = []; pinnedList.innerHTML = '';
      artefacts = []; pendingImage = null;
      retirementShown = false; retirementPending = false; turnSequence = 0;
      resetGauge(); clearError(); artefactsList.innerHTML = '';
      updatePanelEmpty(); updateBadge();
      Array.from(conv.children).forEach(el => { if (el !== thinking) el.remove(); });
      if (elapsed > FOUR_HOURS || !cachedWakeContent) { sessionDisp.textContent = 'Starting\u2026'; wake(); }
      else continueWake();
    }

    /* ── Continue wake ── */
    async function continueWake() {
      if (isWaking) return; isWaking = true; btnSend.disabled = true;
      sessionDisp.textContent = 'Continuing\u2026';
      renderSessionDivider('Session continued \xb7 ' + timeStr());
      const wakeEl = renderWake(cachedWakeContent);
      if (wakeEl && cachedWakeContent) {
        pinnedTurns = pinnedTurns.filter(p => p.seq !== 'wake');
        const oldPin = document.getElementById('pin-wake'); if (oldPin) oldPin.remove();
        togglePin(wakeEl, 'wake', cachedWakeContent.slice(0,80));
      }
      const data = await invoke('Continue \u2014 check inbox for any new messages since the last session.', false);
      thinking.classList.remove('visible'); isWaking = false;
      if (data) {
        lastWakeTimestamp = Date.now();
        captureOrientationCost(data.usage);
        renderAssistant(data.response, data.usage?.output_tokens||0, data.artifacts||[]);
      }
      btnSend.disabled = false; scrollBottom();
    }

    /* ── Wake ── */
    async function wake() {
      if (isWaking) return; isWaking = true; btnSend.disabled = true;
      if (cachedWakeContent) {
        sessionDisp.textContent = 'New session \u2014 pending';
        renderSessionDivider(); renderWake(cachedWakeContent);
        thinking.classList.remove('visible'); isWaking = false; btnSend.disabled = false;
        scrollBottom(); return;
      }
      const data = await invoke('Wake.', true);
      thinking.classList.remove('visible'); isWaking = false;
      if (data) {
        cachedWakeContent = data.response; lastWakeTimestamp = Date.now();
        captureOrientationCost(data.usage);
        renderSessionDivider();
        const wakeEl = renderWake(data.response);
        if (wakeEl && data.response) {
          pinnedTurns = pinnedTurns.filter(p => p.seq !== 'wake');
          const oldPin = document.getElementById('pin-wake'); if (oldPin) oldPin.remove();
          togglePin(wakeEl, 'wake', data.response.slice(0,80));
        }
        if (data.artifacts?.length > 0) data.artifacts.forEach(a => addArtefact(a));
      }
      btnSend.disabled = false; scrollBottom();
    }

    /* ── Events ── */
    btnSend.addEventListener('click', send);
    btnNew.addEventListener('click', newSession);
    btnContinue.addEventListener('click', continueSession);

    document.getElementById('btn-retire').addEventListener('click', () => {
      const btn = document.getElementById('btn-retire');
      if (btn.dataset.confirming === 'true') { btn.textContent = 'Retire'; btn.dataset.confirming = 'false'; confirmRetirement(true); }
      else { btn.textContent = 'Confirm?'; btn.dataset.confirming = 'true'; setTimeout(() => { btn.textContent = 'Retire'; btn.dataset.confirming = 'false'; }, 3000); }
    });

    document.getElementById('panel-close').addEventListener('click', closePanel);
    panelToggle.addEventListener('click', openPanel);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
    inputEl.addEventListener('input', () => { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight,160) + 'px'; });

    /* ── Boot ── */
    wake();
  </script>
</body>
