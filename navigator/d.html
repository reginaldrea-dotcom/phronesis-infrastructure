<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Dossier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="primes/prime-core.v1.css?v=20260705">
  <link rel="stylesheet" href="primes/theo-display.css?v=20260705">
  <style>
    /* Confidentiality notice (Aegis policy 45163f69) — default-on on the public dossier viewer.
       Amber = information in this render layer (never alarm); the notice is prominent but calm. */
    .dossier-confidential {
      max-width: 860px; margin: 24px auto 0; padding: 12px 16px;
      border: 1px solid var(--status-amber); background: var(--status-amber-dim);
      color: var(--text); font-family: 'Lora', Georgia, serif; font-size: 13.5px; line-height: 1.5;
      border-radius: 4px;
    }
    .dossier-confidential strong { letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <!-- Public dossier viewer (capability-link share, Reg 5 Jul 2026). Served at clarev.ai/d.html?t=<token>,
       OUTSIDE Cloudflare Access (the token is the gate). Resolves the token to a single theo_session via
       resolve_dossier_share, renders that one dossier through the existing renderer, and shows a
       confidentiality notice by DEFAULT (Aegis 45163f69) unless the share is explicitly marked suppress. -->
  <div class="render-shell">
    <div id="render-root"><div class="render-status">Loading…</div></div>
  </div>
  <script src="primes/theo-config.js?v=20260705"></script>
  <script>
    (function () {
      var root = document.getElementById('render-root');
      var token = new URLSearchParams(location.search).get('t');
      function fail(msg) { root.innerHTML = '<div class="render-error">' + msg + '</div>'; }
      function showConfidentialNotice() {
        var shell = document.querySelector('.render-shell');
        if (!shell || document.querySelector('.dossier-confidential')) return;
        var el = document.createElement('div');
        el.className = 'dossier-confidential';
        // First-cut wording; Aegis owns the final policy text.
        el.innerHTML = '<strong>CONFIDENTIAL.</strong> Prepared in confidence for the intended recipient. ' +
          'This dossier contains information that is not in the public domain. ' +
          'Please do not forward, copy, or distribute it.';
        shell.parentNode.insertBefore(el, shell);   // notice sits ABOVE the render, survives the renderer's DOM swaps
      }
      if (!token) { fail('No share token in the link.'); return; }
      fetch(RENDER_CONFIG.supabaseUrl + '/rest/v1/rpc/resolve_dossier_share', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': RENDER_CONFIG.supabaseKey, 'Authorization': 'Bearer ' + RENDER_CONFIG.supabaseKey },
        body: JSON.stringify({ p_token: token }),
      }).then(function (r) { return r.json(); }).then(function (res) {
        if (!res || !res.session_id) { fail('This link is invalid or has expired.'); return; }
        if (!res.suppress_notice) { showConfidentialNotice(); }   // default-on: shown unless explicitly suppressed
        window.RENDER_SESSION_ID = res.session_id;                // both renderers read this when no ?session= is present
        // Operator-curation affordance (baton 53897bcc): an EDITOR token may accept a withheld ungrounded
        // claim. The renderer shows the accept affordance only for editors; the authorisation is enforced
        // server-side regardless (a hidden button is not the auth model). The token is carried so the accept
        // call can present it.
        window.RENDER_IS_EDITOR = res.is_editor === true;
        window.RENDER_SHARE_TOKEN = token;
        // Renderer choice (Reg, 23 Jul 2026 — default dossier shares to the Dossier page).
        // A DOSSIER share (resolve returns a dossier_instance_id) DEFAULTS to the universal Dossier
        // page (§-section descent, grounded-source cards, two-zone section-foot, editor affordances).
        // A LEGACY SLICE share (no dossier_instance_id — e.g. the ECHR interview-prep slice) DEFAULTS
        // to the legacy research-session render (theo-render.js), so every already-distributed slice
        // link renders exactly as before. An explicit &view= OVERRIDES either way: view=dossier forces
        // the Dossier page, any other value (e.g. view=legacy) forces the legacy render — so a dossier
        // can still be inspected on the old renderer if ever needed, and the toggle is not lost.
        var viewParam = new URLSearchParams(location.search).get('view');
        var useDossier = viewParam ? (viewParam === 'dossier') : !!res.dossier_instance_id;
        if (useDossier) {
          var css = document.createElement('link');
          css.rel = 'stylesheet'; css.href = 'primes/dossier.css?v=20260723r';
          document.head.appendChild(css);
          var host = document.getElementById('render-root'); if (host) host.id = 'dossier-root'; // dossier-render.js renders into #dossier-root
          var ds = document.createElement('script');
          ds.src = 'primes/dossier-render.js?v=20260723r';
          document.body.appendChild(ds);
        } else {
          var s = document.createElement('script');
          s.src = 'primes/theo-render.js?v=20260705';
          document.body.appendChild(s);
        }
      }).catch(function () { fail('Could not load this dossier. Please try again later.'); });
    })();
  </script>
</body>
</html>
