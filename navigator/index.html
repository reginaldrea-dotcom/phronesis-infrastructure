<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phronesis Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       DESIGN TOKENS — Eames spec + Argos implementation
    ============================================================ */
    :root {
      --bg:           #FAFAF8;
      --surface:      #FFFFFF;
      --border:       #E4E0D8;
      --border-light: #F0EDE8;
      --text-primary: #1E1C18;
      --text-secondary: #7A7468;
      --text-muted:   #B0AAA0;
      --badge-red:    #C94040;
      --badge-amber:  #C8882A;
      --badge-blue:   #3A6EA0;
      --badge-size:   10px;
      --tile-w:       140px;
      --tile-h:       164px;
      --icon-size:    80px;
      --radius:       2px;
      --shadow:       0 1px 4px rgba(0,0,0,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 28px 40px 20px;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: baseline; gap: 20px; }

    h1 {
      font-family: 'Cormorant SC', serif;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--text-primary);
    }

    .header-sub {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .last-refreshed {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    .refresh-btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      color: var(--text-secondary);
      background: none;
      border: 1px solid var(--border);
      padding: 5px 14px;
      cursor: pointer;
      border-radius: var(--radius);
      letter-spacing: 0.3px;
      transition: all 0.15s;
    }
    .refresh-btn:hover { background: var(--border-light); color: var(--text-primary); }

    /* ============================================================
       NAV
    ============================================================ */
    nav {
      display: flex;
      padding: 0 40px;
      border-bottom: 1px solid var(--border);
    }

    nav button {
      font-family: 'Cormorant SC', serif;
      font-size: 12px;
      letter-spacing: 1.5px;
      padding: 14px 4px;
      margin-right: 28px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 1.5px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
    }
    nav button.active {
      color: var(--text-primary);
      border-bottom-color: var(--text-primary);
    }
    nav button:hover:not(.active) { color: var(--text-secondary); }

    /* ============================================================
       PAGES
    ============================================================ */
    .page { display: none; padding: 36px 40px; }
    .page.active { display: block; }

    .section-label {
      font-family: 'Cormorant SC', serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* ============================================================
       TILE GRID
    ============================================================ */
    .tile-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 40px;
    }

    /* ============================================================
       TILE
    ============================================================ */
    .tile {
      width: var(--tile-w);
      height: var(--tile-h);
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      transition: border-color 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .tile:hover:not(.stale) {
      border-color: var(--text-muted);
      box-shadow: 0 3px 10px rgba(0,0,0,0.09);
    }
    .tile.stale {
      opacity: 0.38;
      cursor: default;
    }
    .tile.no-url { cursor: default; }

    .tile-icon {
      width: var(--icon-size);
      height: var(--icon-size);
      object-fit: contain;
    }

    .tile-name {
      font-size: 12px;
      letter-spacing: 0.8px;
      text-align: center;
      color: var(--text-secondary);
      font-variant: small-caps;
    }

    /* ============================================================
       BADGES
    ============================================================ */
    .badges {
      position: absolute;
      top: 9px;
      right: 9px;
      display: flex;
      gap: 4px;
    }

    .badge {
      width: var(--badge-size);
      height: var(--badge-size);
      border-radius: 50%;
    }
    .badge.red   { background: var(--badge-red); }
    .badge.amber { background: var(--badge-amber); }
    .badge.blue  { background: var(--badge-blue); }

    /* ============================================================
       DIVIDER
    ============================================================ */
    .section-divider {
      border: none;
      border-top: 1px solid var(--border-light);
      margin: 4px 0 36px;
    }

    /* ============================================================
       ROUND TABLE — DESKTOP CIRCLE
    ============================================================ */
    .rt-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .circle-stage {
      position: relative;
      width: 660px;
      height: 660px;
    }

    @media (max-width: 720px) { .circle-stage { display: none; } }

    .circle-tile {
      position: absolute;
      transform: translate(-50%, -50%);
    }

    /* Smaller tiles for the circle */
    .circle-tile .tile {
      width: 108px;
      height: 128px;
    }
    .circle-tile .tile-icon { width: 58px; height: 58px; }
    .circle-tile .tile-name { font-size: 11px; }

    /* Invoke All — centre of circle */
    .invoke-centre {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 116px;
      height: 116px;
      border-radius: 50%;
      background: var(--text-primary);
      color: var(--bg);
      font-family: 'Cormorant SC', serif;
      font-size: 13px;
      letter-spacing: 1px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.5;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .invoke-centre:hover {
      background: #333;
      box-shadow: 0 4px 18px rgba(0,0,0,0.22);
    }

    /* ============================================================
       ROUND TABLE — MOBILE LIST
    ============================================================ */
    .mobile-rt { display: none; width: 100%; }
    @media (max-width: 720px) { .mobile-rt { display: block; } }

    .mobile-invoke-btn {
      font-family: 'Cormorant SC', serif;
      font-size: 14px;
      letter-spacing: 1.5px;
      width: 100%;
      padding: 16px;
      background: var(--text-primary);
      color: var(--bg);
      border: none;
      cursor: pointer;
      margin-bottom: 24px;
      border-radius: var(--radius);
    }

    .mobile-tile-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: border-color 0.15s;
    }
    .mobile-tile-row:hover:not(.stale) { border-color: var(--text-muted); }
    .mobile-tile-row.stale { opacity: 0.38; }
    .mobile-tile-row img { width: 44px; height: 44px; object-fit: contain; }
    .mobile-tile-row .tile-name { font-size: 14px; }
    .mobile-tile-row .badges { position: static; }

    /* ============================================================
       INVOKE MODAL
    ============================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30,28,24,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 36px 40px;
      width: 500px;
      max-width: 92vw;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      border-radius: var(--radius);
    }

    .modal h2 {
      font-family: 'Cormorant SC', serif;
      font-size: 17px;
      letter-spacing: 1.5px;
      font-weight: 500;
      margin-bottom: 28px;
      color: var(--text-primary);
    }

    .modal label {
      font-size: 11px;
      letter-spacing: 1.5px;
      font-variant: small-caps;
      color: var(--text-muted);
      display: block;
      margin-bottom: 7px;
    }

    .modal input, .modal textarea {
      width: 100%;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      margin-bottom: 20px;
      background: var(--bg);
      color: var(--text-primary);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--text-muted); }
    .modal textarea { height: 90px; resize: vertical; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .modal-actions button {
      font-family: 'Cormorant SC', serif;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 9px 22px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      border-radius: var(--radius);
      transition: all 0.15s;
    }
    .cancel-btn:hover { background: var(--border-light); }
    .send-btn {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
    }
    .send-btn:hover { background: #333; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ============================================================
       STATUS / LOADING
    ============================================================ */
    .status-msg {
      font-size: 14px;
      color: var(--text-muted);
      font-style: italic;
      padding: 8px 0;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 600px) {
      header { padding: 20px 20px 16px; }
      nav { padding: 0 20px; }
      .page { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     HEADER
============================================================ -->
<header>
  <div class="header-left">
    <h1>Phronesis</h1>
    <span class="header-sub">Navigator</span>
  </div>
  <div class="header-right">
    <span class="last-refreshed" id="lastRefreshed">Loading…</span>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </div>
</header>

<!-- ============================================================
     NAV
============================================================ -->
<nav>
  <button class="active" onclick="showPage('wheel', this)">The Wheel</button>
  <button onclick="showPage('roundtable', this)">Round Table</button>
</nav>

<!-- ============================================================
     PAGE 1 — THE WHEEL
============================================================ -->
<div id="wheel" class="page active">
  <p class="section-label">Wheel Primes</p>
  <div class="tile-grid" id="primeTiles">
    <p class="status-msg">Loading…</p>
  </div>

  <hr class="section-divider">
  <p class="section-label">Consultants</p>
  <div class="tile-grid" id="consultantTiles">
    <p class="status-msg">Loading…</p>
  </div>
</div>

<!-- ============================================================
     PAGE 2 — ROUND TABLE
============================================================ -->
<div id="roundtable" class="page">
  <div class="rt-container">
    <!-- Desktop: circle -->
    <div class="circle-stage" id="circleStage"></div>
    <!-- Mobile: list -->
    <div class="mobile-rt" id="mobileRt">
      <button class="mobile-invoke-btn" onclick="openModal()">Invoke All Primes</button>
      <div id="mobilePrimeList"></div>
    </div>
  </div>
</div>

<!-- ============================================================
     INVOKE MODAL
============================================================ -->
<div class="modal-overlay" id="invokeModal" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>Invoke All Primes</h2>
    <label>Topic</label>
    <input type="text" id="invokeTopic" placeholder="e.g. Connector rollout — round 2">
    <label>Message</label>
    <textarea id="invokeMessage">Conference called. Read the flag and respond if called. Otherwise read if you like and take part only if you see a gap.</textarea>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="send-btn" id="sendBtn" onclick="sendInvokeAll()">Send to All</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — paste anon key before deployment
============================================================ */
const SUPABASE_URL      = 'https://vysenpymsfhgionqfulf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_dEklXoGWXhXJHZl54VKKTg_Jycm-UGM';
const INVOKE_FN_URL     = SUPABASE_URL + '/functions/v1/prime-invoke-all';

const ICONS = {
  argos:          'primes/argos.png',
  napoleon:       'primes/napoleon.png',
  theophrastus:   'primes/theophrastus.png',
  ghostwheel:     'primes/ghostwheel.png',
  constantinople: 'primes/constantinople.png',
  antechamber:    'primes/antechamber.png',
  aegis:          'primes/aegis.png',
  homer:          'primes/homer.png',
  ricardo:        'primes/ricardo.png',
  eames:          'primes/eames.png',
  khaos:          'consultants/khaos.png',
  redshirt:       'consultants/redshirt.png',
};

const WHEEL_PRIMES      = ['napoleon','argos','theophrastus','ghostwheel','constantinople','antechamber','aegis','homer','ricardo','eames'];
const CONSULTANTS       = ['khaos','redshirt'];
const STALE_HOURS       = 24;

/* ============================================================
   STATE
============================================================ */
let instances   = {};
let unreadMap   = {};
let attentionMap = {};

/* ============================================================
   SUPABASE FETCH
============================================================ */
async function sb(path) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
  });
  if (!r.ok) throw new Error('Supabase error ' + r.status);
  return r.json();
}

/* ============================================================
   LOAD DATA
============================================================ */
async function loadData() {
  document.getElementById('lastRefreshed').textContent = 'Refreshing…';
  try {
    // Instances
    const rows = await sb('instances?select=name,display_name,chat_url,instance_type,last_seen_at');
    instances = {};
    rows.forEach(r => instances[r.name] = r);

    // Unread messages
    const msgs = await sb('prime_messages?select=to_lineage&status=eq.pending');
    unreadMap = {};
    msgs.forEach(m => { unreadMap[m.to_lineage] = (unreadMap[m.to_lineage]||0) + 1; });

    // Attention levels (highest per posting lineage)
    const posts = await sb('wheel_posts?select=posting_lineage,effective_attention_level&superseded_at=is.null');
    attentionMap = {};
    const rank = { 'urgent':2, 'moderate':1, 'low':0 };
    posts.forEach(p => {
      const cur = attentionMap[p.posting_lineage];
      if (!cur || (rank[p.effective_attention_level]||0) > (rank[cur]||0)) {
        attentionMap[p.posting_lineage] = p.effective_attention_level;
      }
    });

    renderWheel();
    renderRoundTable();

    const t = new Date();
    document.getElementById('lastRefreshed').textContent =
      'Updated ' + t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.getElementById('lastRefreshed').textContent = 'Error — check console';
    console.error(e);
  }
}

/* ============================================================
   HELPERS
============================================================ */
function isStale(lastSeen) {
  if (!lastSeen) return true;
  return (Date.now() - new Date(lastSeen).getTime()) > STALE_HOURS * 3600 * 1000;
}

function displayName(name) {
  const d = instances[name];
  if (d && d.display_name) return d.display_name;
  return name.charAt(0).toUpperCase() + name.slice(1);
}

function badges(name) {
  const parts = [];
  if (unreadMap[name] > 0)
    parts.push(`<span class="badge red" title="${unreadMap[name]} unread"></span>`);
  if (attentionMap[name] === 'urgent')
    parts.push(`<span class="badge amber" title="Urgent attention"></span>`);
  const inst = instances[name];
  if (inst && !isStale(inst.last_seen_at))
    parts.push(`<span class="badge blue" title="Active within 24h"></span>`);
  return parts.length ? `<div class="badges">${parts.join('')}</div>` : '';
}

/* ============================================================
   RENDER WHEEL
============================================================ */
function makeTile(name) {
  const inst   = instances[name] || {};
  const url    = inst.chat_url;
  const stale  = isStale(inst.last_seen_at);
  const dname  = displayName(name);
  const icon   = ICONS[name] || '';
  const cls    = 'tile' + (stale ? ' stale' : '') + (!url ? ' no-url' : '');

  if (url && !stale) {
    return `<a class="${cls}" href="${url}" target="_blank" rel="noopener" title="${dname}">
      ${badges(name)}
      <img class="tile-icon" src="${icon}" alt="${dname}" onerror="this.style.visibility='hidden'">
      <span class="tile-name">${dname}</span>
    </a>`;
  }
  return `<div class="${cls}" title="${dname}${stale?' — last seen >24h':''}">
    ${badges(name)}
    <img class="tile-icon" src="${icon}" alt="${dname}" onerror="this.style.visibility='hidden'">
    <span class="tile-name">${dname}</span>
  </div>`;
}

function renderWheel() {
  document.getElementById('primeTiles').innerHTML =
    WHEEL_PRIMES.map(n => makeTile(n)).join('');
  document.getElementById('consultantTiles').innerHTML =
    CONSULTANTS.map(n => makeTile(n)).join('');
}

/* ============================================================
   RENDER ROUND TABLE
============================================================ */
function renderRoundTable() {
  renderCircle();
  renderMobile();
}

function renderCircle() {
  const stage  = document.getElementById('circleStage');
  const cx     = 330, cy = 330, r = 268;
  const n      = WHEEL_PRIMES.length;

  let html = `<button class="invoke-centre" onclick="openModal()">Invoke<br>All</button>`;

  WHEEL_PRIMES.forEach((name, i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    const inst  = instances[name] || {};
    const url   = inst.chat_url;
    const stale = isStale(inst.last_seen_at);
    const dname = displayName(name);
    const icon  = ICONS[name] || '';
    const cls   = 'tile' + (stale ? ' stale' : '') + (!url ? ' no-url' : '');

    let inner = `
      ${badges(name)}
      <img class="tile-icon" src="${icon}" alt="${dname}"
           style="width:58px;height:58px"
           onerror="this.style.visibility='hidden'">
      <span class="tile-name" style="font-size:11px">${dname}</span>`;

    if (url && !stale) {
      html += `<div class="circle-tile" style="left:${x}px;top:${y}px">
        <a class="${cls}" href="${url}" target="_blank" rel="noopener">${inner}</a>
      </div>`;
    } else {
      html += `<div class="circle-tile" style="left:${x}px;top:${y}px">
        <div class="${cls}">${inner}</div>
      </div>`;
    }
  });

  stage.innerHTML = html;
}

function renderMobile() {
  const list = document.getElementById('mobilePrimeList');
  list.innerHTML = WHEEL_PRIMES.map(name => {
    const inst  = instances[name] || {};
    const url   = inst.chat_url;
    const stale = isStale(inst.last_seen_at);
    const dname = displayName(name);
    const icon  = ICONS[name] || '';
    const cls   = 'mobile-tile-row' + (stale ? ' stale' : '');

    const inner = `
      <img src="${icon}" alt="${dname}" onerror="this.style.visibility='hidden'">
      <span class="tile-name">${dname}</span>
      ${badges(name)}`;

    if (url && !stale) {
      return `<a class="${cls}" href="${url}" target="_blank" rel="noopener">${inner}</a>`;
    }
    return `<div class="${cls}">${inner}</div>`;
  }).join('');
}

/* ============================================================
   NAVIGATION
============================================================ */
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

/* ============================================================
   INVOKE ALL MODAL
============================================================ */
function openModal() {
  document.getElementById('invokeModal').style.display = 'flex';
  setTimeout(() => document.getElementById('invokeTopic').focus(), 50);
}

function closeModal() {
  document.getElementById('invokeModal').style.display = 'none';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('invokeModal')) closeModal();
}

async function sendInvokeAll() {
  const topic   = document.getElementById('invokeTopic').value.trim();
  const message = document.getElementById('invokeMessage').value.trim();
  if (!topic) { alert('Please enter a topic.'); return; }

  const btn = document.getElementById('sendBtn');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const res = await fetch(INVOKE_FN_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
      },
      body: JSON.stringify({
        topic,
        message,
        from_lineage: 'reg',
        target_lineages: WHEEL_PRIMES
      })
    });
    const data = await res.json();
    if (res.ok) {
      closeModal();
      document.getElementById('invokeTopic').value = '';
      alert('Conference invoked. ' + (data.sent || WHEEL_PRIMES.length) + ' Primes notified.');
      loadData();
    } else {
      alert('Error: ' + (data.error || 'Unknown — check console'));
    }
  } catch(e) {
    alert('Network error: ' + e.message);
  } finally {
    btn.textContent = 'Send to All';
    btn.disabled = false;
  }
}

/* ============================================================
   INIT
============================================================ */
document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
