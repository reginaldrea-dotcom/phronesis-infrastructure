<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phronesis Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+SC:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#FAFAF8;--surface:#FFFFFF;--bg-dim:#F0EDE6;--border:#E0DDD6;--border-lt:#EDEBE5;--text:#1C1C1A;--muted:#6B6B66;--light:#A8A49E;--badge-red:#B03030;--badge-amber:#B8742A;--badge-blue:#2557A7;--badge-green:#1A7A3C;--badge-size:10px;--btn:#2C2C2A;--btn-text:#FAFAF8;--overlay:rgba(20,18,16,0.42);--tile-w:140px;--tile-h:164px;--icon-size:80px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);font-family:'Lora',Georgia,serif;color:var(--text);min-height:100vh}
    header{display:flex;align-items:baseline;justify-content:space-between;padding:28px 40px 20px;border-bottom:1px solid var(--border)}
    .header-left{display:flex;align-items:baseline;gap:20px}
    h1{font-family:'Cormorant SC',serif;font-size:20px;font-weight:500;letter-spacing:2px}
    .header-sub{font-size:13px;color:var(--light);font-style:italic}
    .header-right{display:flex;align-items:center;gap:16px}
    .last-refreshed{font-size:12px;color:var(--light);font-style:italic}
    .refresh-btn{font-family:'Lora',serif;font-size:13px;color:var(--muted);background:none;border:1px solid var(--border);padding:5px 14px;cursor:pointer;border-radius:2px;transition:all .15s}
    .refresh-btn:hover{background:var(--border-lt);color:var(--text)}
    nav{display:flex;padding:0 40px;border-bottom:1px solid var(--border)}
    nav button{font-family:'Cormorant SC',serif;font-size:12px;letter-spacing:1.5px;padding:14px 4px;margin-right:28px;border:none;background:none;cursor:pointer;color:var(--light);border-bottom:1.5px solid transparent;margin-bottom:-1px;transition:all .15s;position:relative}
    nav button.active{color:var(--text);border-bottom-color:var(--text)}
    nav button:hover:not(.active){color:var(--muted)}
    .nav-badge{position:absolute;top:10px;right:-10px;background:var(--badge-amber);color:white;font-family:sans-serif;font-size:9px;font-weight:600;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .page{display:none;padding:36px 40px}.page.active{display:block}
    .section-label{font-family:'Cormorant SC',serif;font-size:11px;letter-spacing:2px;color:var(--light);margin-bottom:20px}
    .tile-grid{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:40px}
    .tile{width:var(--tile-w);height:var(--tile-h);background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative;text-decoration:none;color:inherit;box-shadow:0 1px 4px rgba(0,0,0,.06);border-radius:2px;transition:border-color .15s,box-shadow .15s;cursor:pointer}
    .tile:hover:not(.stale){border-color:var(--muted);box-shadow:0 3px 10px rgba(0,0,0,.09)}
    .tile.stale{opacity:.38;cursor:default}
    .tile-icon{width:var(--icon-size);height:var(--icon-size);object-fit:contain}
    .tile-name{font-size:12px;letter-spacing:.8px;font-variant:small-caps;color:var(--muted)}
    .badges{position:absolute;top:9px;right:9px;display:flex;gap:4px}
    .badge{width:var(--badge-size);height:var(--badge-size);border-radius:50%}
    .badge.red{background:var(--badge-red)}.badge.amber{background:var(--badge-amber)}.badge.blue{background:var(--badge-blue)}
    .section-divider{border:none;border-top:1px solid var(--border-lt);margin:4px 0 36px}
    .tiles-section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px}
    .gear-btn{font-family:'Lora',serif;font-size:12px;color:var(--light);background:none;border:none;cursor:pointer;letter-spacing:.3px;transition:color .15s}
    .gear-btn:hover{color:var(--muted)}
    /* ROUND TABLE TOP BAR */
    .rt-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .rt-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:3px;overflow:hidden}
    .rt-tab{font-family:'Cormorant SC',serif;font-size:11px;letter-spacing:1px;padding:6px 18px;border:none;background:none;cursor:pointer;color:var(--muted);transition:all .15s}
    .rt-tab.active{background:var(--btn);color:var(--btn-text)}
    .rt-tab:disabled{opacity:.35;cursor:default}
    .rt-actions{display:flex;gap:8px}
    /* CIRCLE */
    .rt-container{display:flex;flex-direction:column;align-items:center}
    .circle-stage{position:relative;width:660px;height:660px}
    @media(max-width:720px){.circle-stage{display:none}}
    .circle-tile{position:absolute;transform:translate(-50%,-50%)}
    .circle-tile .tile{width:108px;height:128px}
    .circle-tile .tile-icon{width:58px;height:58px}
    .circle-tile .tile-name{font-size:11px}
    .tile.resp-blue{border-color:var(--badge-blue);box-shadow:0 0 0 1px var(--badge-blue)}
    .invoke-centre{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:116px;height:116px;border-radius:50%;background:var(--btn);color:var(--btn-text);font-family:'Cormorant SC',serif;font-size:13px;letter-spacing:1px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.5;box-shadow:0 2px 12px rgba(0,0,0,.18);transition:background .2s}
    .invoke-centre:hover{background:#444}
    .mobile-rt{display:none;width:100%}
    @media(max-width:720px){.mobile-rt{display:block}}
    .mobile-invoke-btn{font-family:'Cormorant SC',serif;font-size:14px;letter-spacing:1.5px;width:100%;padding:16px;background:var(--btn);color:var(--btn-text);border:none;cursor:pointer;margin-bottom:24px;border-radius:2px}
    .mobile-tile-row{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:2px;margin-bottom:8px;text-decoration:none;color:inherit;position:relative;transition:border-color .15s}
    .mobile-tile-row:hover:not(.stale){border-color:var(--muted)}.mobile-tile-row.stale{opacity:.38}
    .mobile-tile-row img{width:44px;height:44px;object-fit:contain}.mobile-tile-row .tile-name{font-size:14px}.mobile-tile-row .badges{position:static}
    /* CONFERENCE */
    .conf-banner{background:var(--btn);color:var(--btn-text);padding:16px 24px;border-radius:4px;margin-bottom:20px}
    .conf-banner-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
    .conf-banner-title{font-family:'Cormorant SC',serif;font-size:14px;letter-spacing:1px}
    .conf-banner-meta{font-size:11px;color:rgba(250,250,248,.6);font-style:italic}
    .conf-banner-body{font-size:13px;line-height:1.6;color:rgba(250,250,248,.85);max-height:120px;overflow-y:auto}
    .conf-banner-round{font-size:11px;color:var(--badge-amber);margin-top:6px;font-family:'Cormorant SC',serif;letter-spacing:1px}
    .conf-responses-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
    .conf-responses-title{font-family:'Cormorant SC',serif;font-size:13px;letter-spacing:1.5px;color:var(--light)}
    .conf-resp-count{font-size:12px;color:var(--light);font-style:italic}
    .resp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:28px}
    .resp-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden}
    .resp-card.responded{border-color:var(--badge-blue)}
    .resp-card-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
    .resp-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;color:var(--muted);flex-shrink:0;overflow:hidden}
    .resp-avatar img{width:100%;height:100%;object-fit:contain}
    .resp-prime-name{font-size:12px;font-variant:small-caps;letter-spacing:.5px;color:var(--text);flex:1}
    .resp-status-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
    .resp-card.responded .resp-status-dot{background:var(--badge-blue)}
    .resp-expand{font-size:11px;color:var(--light)}
    .resp-summary{padding:0 14px 8px;font-size:12px;color:var(--muted);font-style:italic;line-height:1.5}
    .resp-body{display:none;padding:10px 14px 14px;font-size:13px;color:var(--muted);line-height:1.6;border-top:1px solid var(--border-lt)}
    .resp-card.expanded .resp-body{display:block}
    .resp-card.expanded .resp-expand{transform:rotate(180deg)}
    .resp-date{padding:0 14px 8px;font-size:11px;color:var(--light);font-style:italic}
    .awaiting-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border:1px solid var(--border);border-radius:12px;font-size:11px;color:var(--light)}
    .awaiting-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:var(--overlay);display:flex;align-items:center;justify-content:center;z-index:200}
    .modal-card{background:var(--surface);border-radius:10px;width:440px;max-width:92vw;box-shadow:0 16px 48px rgba(20,18,16,.22),0 2px 8px rgba(20,18,16,.10);overflow:hidden}
    .modal-head{padding:22px 24px 14px;border-bottom:1px solid var(--border-lt)}
    .modal-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;letter-spacing:-.01em}
    .modal-sub{font-size:12px;color:var(--light);margin-top:2px;font-style:italic}
    .modal-body{padding:16px 24px}
    .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid var(--border-lt)}
    .modal-error{font-size:12px;color:var(--badge-red);margin-right:auto;align-self:center;display:none}
    .btn-cancel{font-family:'Cormorant SC',serif;font-size:12px;letter-spacing:1px;padding:9px 22px;cursor:pointer;border:1px solid var(--border);background:none;border-radius:2px;transition:all .15s}
    .btn-cancel:hover{background:var(--border-lt)}
    .btn-send{font-family:'Cormorant SC',serif;font-size:12px;letter-spacing:1px;padding:9px 22px;cursor:pointer;background:var(--btn);color:var(--btn-text);border:1px solid var(--btn);border-radius:2px;transition:all .15s}
    .btn-send:hover{background:#444}.btn-send:disabled{opacity:.5;cursor:not-allowed}
    .btn-close-conf{font-family:'Cormorant SC',serif;font-size:11px;letter-spacing:1px;padding:6px 16px;cursor:pointer;border:1px solid var(--border);background:none;border-radius:2px;color:var(--muted);transition:all .15s}
    .btn-close-conf:hover{border-color:var(--badge-red);color:var(--badge-red)}
    .mode-tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:3px;overflow:hidden}
    .mode-tab{flex:1;font-family:'Cormorant SC',serif;font-size:11px;letter-spacing:1px;padding:7px;border:none;background:none;cursor:pointer;color:var(--muted);transition:all .15s;text-align:center}
    .mode-tab.active{background:var(--btn);color:var(--btn-text)}
    .conf-fields{display:none}.conf-fields.show{display:block}
    .select-row{display:flex;gap:14px;margin-bottom:10px}
    .sel-link{font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:2px;font-family:'Lora',serif}
    .sel-link:hover{color:var(--text)}
    .prime-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:16px}
    .p-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;user-select:none;transition:background .1s}
    .p-row:hover{background:var(--bg-dim)}
    .p-check{width:15px;height:15px;border:1.5px solid var(--border);border-radius:3px;background:white;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s}
    .p-row.on .p-check{background:var(--btn);border-color:var(--btn)}
    .p-row.on .p-check::after{content:'';width:8px;height:5px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg) translate(1px,-1px);display:block}
    .p-icon{width:26px;height:26px;border-radius:50%;background:var(--bg-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;color:var(--muted);flex-shrink:0;overflow:hidden}
    .p-icon img{width:100%;height:100%;object-fit:contain}
    .p-name{font-size:13px;color:var(--text)}
    .msg-label{font-family:'Cormorant SC',serif;font-size:10px;letter-spacing:2px;color:var(--light);margin-bottom:6px}
    .msg-field{width:100%;font-family:'Lora',Georgia,serif;font-size:13px;border:1px solid var(--border);padding:10px 12px;background:var(--bg);color:var(--text);border-radius:2px;outline:none;resize:vertical;height:80px;transition:border-color .15s}
    .msg-field:focus{border-color:var(--muted)}
    .topic-field{width:100%;font-family:'Lora',Georgia,serif;font-size:13px;border:1px solid var(--border);padding:8px 12px;background:var(--bg);color:var(--text);border-radius:2px;outline:none;margin-bottom:12px;transition:border-color .15s}
    .topic-field:focus{border-color:var(--muted)}
    /* NOTICES */
    .notices-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
    .notices-title{font-family:'Cormorant SC',serif;font-size:18px;letter-spacing:1px}
    .notices-count{font-size:13px;color:var(--light);font-style:italic}
    .notices-desc{font-size:13px;color:var(--muted);margin-bottom:28px;font-style:italic}
    .notice-item{border:1px solid var(--border);border-radius:4px;margin-bottom:12px;background:var(--surface);transition:opacity .3s;overflow:hidden}
    .notice-item.fragged{opacity:.55}.notice-item.dismissed{display:none}
    .notice-main{display:flex;gap:16px;padding:16px}
    .notice-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--muted);flex-shrink:0;overflow:hidden}
    .notice-avatar img{width:100%;height:100%;object-fit:contain}
    .notice-content{flex:1;min-width:0}
    .notice-topic{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .expand-arrow{color:var(--light);flex-shrink:0;font-size:12px}
    .notice-summary{font-size:13px;color:var(--muted);line-height:1.5}
    .notice-body{display:none;font-size:13px;color:var(--muted);line-height:1.6;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-lt)}
    .notice-item.expanded .notice-body{display:block}
    .notice-item.expanded .expand-arrow{transform:rotate(180deg)}
    .notice-meta{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--border-lt);background:var(--bg)}
    .notice-prime-name{font-size:12px;color:var(--muted);font-variant:small-caps;letter-spacing:.5px}
    .notice-date{font-size:12px;color:var(--light);font-style:italic}
    .level-badge{display:flex;align-items:center;gap:5px;font-size:11px;letter-spacing:.5px}
    .l-dot{width:6px;height:6px;border-radius:50%}
    .level-urgent .l-dot{background:var(--badge-amber)}.level-moderate .l-dot{background:var(--badge-blue)}
    .l-text{color:var(--muted)}
    .with-ac{font-size:11px;color:var(--badge-amber);font-style:italic;display:none}
    .notice-item.fragged .with-ac{display:block}
    .notice-actions{margin-left:auto;display:flex;gap:8px}
    .btn-dismiss,.btn-frag{font-family:'Cormorant SC',serif;font-size:11px;letter-spacing:.8px;padding:5px 14px;border:1px solid var(--border);background:none;cursor:pointer;border-radius:2px;transition:all .15s}
    .btn-dismiss:hover{background:var(--badge-red);color:white;border-color:var(--badge-red)}
    .btn-frag:hover{background:var(--badge-amber);color:white;border-color:var(--badge-amber)}
    .btn-frag:disabled{opacity:.4;cursor:not-allowed}
    .notices-empty{font-size:14px;color:var(--light);font-style:italic;padding:40px 0;text-align:center}
    .admin-input{width:100%;font-family:'Lora',serif;font-size:12px;border:1px solid var(--border);padding:6px 10px;background:var(--bg);color:var(--text);border-radius:2px;outline:none}
    .admin-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .admin-name{font-size:13px;color:var(--muted);min-width:110px;font-variant:small-caps}
    .tile-refresh{position:absolute;bottom:7px;right:8px;font-size:15px;color:var(--light);background:none;border:none;cursor:pointer;padding:2px;line-height:1;transition:color .15s;z-index:2}
    .tile-refresh:hover{color:var(--muted)}
    .status-msg{font-size:14px;color:var(--light);font-style:italic;padding:8px 0}
    @media(max-width:600px){header{padding:20px 20px 16px}nav{padding:0 20px}.page{padding:24px 20px}}
  </style>
</head>
<body>
<header>
  <div class="header-left"><h1>Phronesis</h1><span class="header-sub">Navigator</span></div>
  <div class="header-right">
    <span class="last-refreshed" id="lastRefreshed">Loading…</span>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </div>
</header>
<nav>
  <button class="active" onclick="showPage('roundtable',this)">Round Table</button>
  <button onclick="showPage('wheel',this)">Tiles</button>
  <button onclick="showPage('notices',this)">Notices<span class="nav-badge" id="noticesBadge" style="display:none"></span></button>
</nav>

<!-- ROUND TABLE -->
<div id="roundtable" class="page active">
  <div class="rt-topbar">
    <div class="rt-tabs">
      <button class="rt-tab active" id="tabCircle" onclick="setRtView('circle')">Circle</button>
      <button class="rt-tab" id="tabConf" onclick="setRtView('conference')" style="display:none">Conference</button>
    </div>
    <div class="rt-actions">
      <button class="btn-close-conf" id="btnCloseConf" onclick="closeConference()" style="display:none">Close conference</button>
      <button class="btn-send" style="font-size:11px;padding:6px 18px" onclick="openModal()">Invoke</button>
    </div>
  </div>
  <div id="rtContent"></div>
  <div class="mobile-rt"><div id="mobilePrimeList"></div></div>
</div>

<!-- TILES -->
<div id="wheel" class="page">
  <div class="tiles-section-head"><span class="section-label" style="margin-bottom:0">Primes</span></div>
  <div class="tile-grid" id="primeTiles"><p class="status-msg">Loading…</p></div>
  <hr class="section-divider">
  <div class="tiles-section-head">
    <span class="section-label" style="margin-bottom:0">Consultants &amp; Others</span>
    <button class="gear-btn" onclick="openAdminPanel()">⚙ Manage</button>
  </div>
  <div class="tile-grid" id="consultantTiles"></div>
  <div class="tile-grid" id="otherTiles"></div>
</div>

<!-- NOTICES -->
<div id="notices" class="page">
  <div class="notices-head"><div class="notices-title">Notices</div><div class="notices-count" id="noticesCount"></div></div>
  <div class="notices-desc">Wheel posts at moderate or urgent attention, not yet acknowledged.</div>
  <div id="noticesList"><p class="status-msg">Loading…</p></div>
</div>

<!-- INVOKE MODAL -->
<div class="modal-overlay" id="invokeModal" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal-card">
    <div class="modal-head"><div class="modal-title">Invoke</div><div class="modal-sub" id="invokeModalSub">Select Primes and send message</div></div>
    <div class="modal-body">
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" onclick="setMode('broadcast',this)">Broadcast</button>
        <button class="mode-tab" onclick="setMode('conference',this)">Conference</button>
      </div>
      <div class="conf-fields" id="confFields">
        <div class="msg-label" style="margin-bottom:6px">Conference topic</div>
        <input class="topic-field" id="confTopic" placeholder="e.g. Teams and Theo integration">
      </div>
      <div class="select-row">
        <span class="sel-link" onclick="selectAll()">Select all</span>
        <span class="sel-link" onclick="clearAll()">Clear</span>
      </div>
      <div class="prime-grid" id="primeGrid"></div>
      <div class="msg-label">Message</div>
      <textarea class="msg-field" id="invokeMessage">Conference called. Read the conference table and post your response to conference_responses directly.</textarea>
    </div>
    <div class="modal-foot">
      <span class="modal-error" id="modalError"></span>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-send" id="sendBtn" onclick="sendInvoke()">Send</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="modal-overlay" id="adminPanel" style="display:none" onclick="handleAdminOverlay(event)">
  <div class="modal-card" style="width:500px;max-height:80vh;overflow-y:auto">
    <div class="modal-head"><div class="modal-title" style="font-size:20px">Manage Tiles</div><div class="modal-sub">Edit URLs for Consultants and Others</div></div>
    <div class="modal-body" id="adminBody"></div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeAdminPanel()">Close</button>
      <button class="btn-send" id="adminSaveBtn" onclick="saveAdmin()">Save changes</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL        = 'https://vysenpymsfhgionqfulf.supabase.co';
const SUPABASE_ANON_KEY   = 'PASTE_ANON_KEY_HERE';
const INVOKE_FN_URL       = SUPABASE_URL + '/functions/v1/prime-invoke-all';
const DISMISS_FN_URL      = SUPABASE_URL + '/functions/v1/navigator-dismiss';
const STATUS_FN_URL       = SUPABASE_URL + '/functions/v1/navigator-status';
const TILES_ADMIN_FN_URL  = SUPABASE_URL + '/functions/v1/navigator-tiles-admin';
const CLOSE_CONF_FN_URL   = SUPABASE_URL + '/functions/v1/navigator-conference-close';
const REFRESH_FN_URL      = SUPABASE_URL + '/functions/v1/navigator-refresh-prime';

const ICONS = {
  argos:'images/primes/argos.png',napoleon:'images/primes/napoleon.png',theophrastus:'images/primes/theophrastus.png',
  ghostwheel:'images/primes/ghostwheel.png',constantinople:'images/primes/constantinople.png',antechamber:'images/primes/antechamber.png',
  aegis:'images/primes/aegis.png',homer:'images/primes/homer.png',ricardo:'images/primes/ricardo.png',eames:'images/primes/eames.png',
  khaos:'images/consultants/khaos.png',redshirt:'images/consultants/redshirt.png',
};
const WHEEL_PRIMES=['napoleon','argos','theophrastus','ghostwheel','constantinople','antechamber','aegis','homer','ricardo','eames'];
const STALE_HOURS=168;

let instances={},unreadMap={},attentionMap={},noticesData=[],projectTiles=[];
let openConference=null,conferenceResponses=[];
let invokeTime=null,invokeMode='broadcast';
const checkedPrimes=new Set(['napoleon','argos','ghostwheel']);
let pendingAdminChanges={};

/* VIEW STATE — Bug 1 fix */
function getRtView(){return sessionStorage.getItem('rtView')||'auto';}
function setRtView(view){
  sessionStorage.setItem('rtView',view);
  updateRtTabs();
  renderRtContent();
}
function updateRtTabs(){
  const view=getRtView();
  const hasConf=!!openConference;
  const showConf=hasConf&&(view==='conference'||(view==='auto'));
  document.getElementById('tabCircle').classList.toggle('active',!showConf);
  const tc=document.getElementById('tabConf');
  tc.style.display=hasConf?'':'none';
  tc.classList.toggle('active',showConf&&hasConf);
  document.getElementById('btnCloseConf').style.display=hasConf?'':'none';
}

async function sb(path){
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}});
  if(!r.ok)throw new Error('Supabase '+r.status);
  return r.json();
}

async function loadData(){
  document.getElementById('lastRefreshed').textContent='Refreshing…';
  try{
    const rows=await sb('instances?select=name,display_name,chat_url,instance_type,last_seen_at');
    instances={};rows.forEach(r=>instances[r.name]=r);
    try{const sr=await fetch(STATUS_FN_URL,{headers:{'Authorization':'Bearer '+SUPABASE_ANON_KEY}});const sd=await sr.json();unreadMap=sd.unread||{};}catch(e){unreadMap={};}
    const posts=await sb('wheel_posts?select=posting_lineage,effective_attention_level&superseded_at=is.null');
    attentionMap={};const rank={'urgent':2,'moderate':1,'low':0};
    posts.forEach(p=>{const cur=attentionMap[p.posting_lineage];if(!cur||(rank[p.effective_attention_level]||0)>(rank[cur]||0))attentionMap[p.posting_lineage]=p.effective_attention_level;});
    noticesData=await sb('wheel_posts?select=id,posting_lineage,topic,body,effective_attention_level,created_at&effective_attention_level=in.(moderate,urgent)&superseded_at=is.null&reg_acknowledged_at=is.null&order=created_at.desc');
    projectTiles=await sb('project_tiles?select=id,name,url,category,display_order,icon_ref&order=category,display_order');
    const confs=await sb('conferences?select=id,topic,body,called_by,current_round,created_at,invited_lineages&status=eq.open&order=created_at.desc&limit=1');
    if(confs.length>0){
      openConference=confs[0];
      conferenceResponses=await sb(`conference_responses?select=id,posting_lineage,summary,body,round,created_at&conference_id=eq.${openConference.id}&order=created_at.asc`);
    }else{
      openConference=null;conferenceResponses=[];
      if(getRtView()==='conference')sessionStorage.setItem('rtView','circle');
    }
    renderWheel();updateRtTabs();renderRtContent();renderMobile();renderNotices();
    const t=new Date();document.getElementById('lastRefreshed').textContent='Updated '+t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }catch(e){document.getElementById('lastRefreshed').textContent='Error — check console';console.error(e);}
}

function isStale(s){if(!s)return true;return(Date.now()-new Date(s).getTime())>STALE_HOURS*3600*1000;}
function dName(n){const d=instances[n];if(d&&d.display_name)return d.display_name;return n.charAt(0).toUpperCase()+n.slice(1);}
function badges(n){const p=[];if(unreadMap[n]>0)p.push(`<span class="badge red"></span>`);if(attentionMap[n]==='urgent')p.push(`<span class="badge amber"></span>`);const i=instances[n];if(i&&!isStale(i.last_seen_at))p.push(`<span class="badge blue"></span>`);return p.length?`<div class="badges">${p.join('')}</div>`:''}
function makeTile(n){const i=instances[n]||{};const url=i.chat_url;const s=isStale(i.last_seen_at);const dn=dName(n);const icon=ICONS[n]||'';const cls='tile'+(s?' stale':'');const inner=`${badges(n)}<img class="tile-icon" src="${icon}" alt="${dn}" onerror="this.style.visibility='hidden'"><span class="tile-name">${dn}</span>`;if(url&&!s)return`<a class="${cls}" href="${url}" target="_blank" rel="noopener">${inner}</a>`;return`<div class="${cls}">${inner}<button class="tile-refresh" onclick="refreshPrime('${n}')" title="Mark active — I just opened this Prime">↻</button></div>`;}
function makeProjectTile(t){const src=t.icon_ref?`images/consultants/${t.icon_ref}`:'';const inner=src?`<img class="tile-icon" src="${src}" alt="${t.name}" onerror="this.style.visibility='hidden'"><span class="tile-name">${t.name}</span>`:`<span class="tile-name" style="font-size:13px;text-align:center;padding:0 8px">${t.name}</span>`;if(t.url)return`<a class="tile" href="${t.url}" target="_blank" rel="noopener">${inner}</a>`;return`<div class="tile stale">${inner}</div>`;}

function renderWheel(){
  document.getElementById('primeTiles').innerHTML=WHEEL_PRIMES.map(makeTile).join('');
  const cons=projectTiles.filter(t=>t.category==='consultant');
  document.getElementById('consultantTiles').innerHTML=cons.length?cons.map(makeProjectTile).join(''):'<p class="status-msg">No consultants configured.</p>';
  const oth=projectTiles.filter(t=>t.category==='other');
  document.getElementById('otherTiles').innerHTML=oth.length?oth.map(makeProjectTile).join(''):'';
}

function renderRtContent(){
  const view=getRtView();
  const showConf=openConference&&(view==='conference'||(view==='auto'));
  if(showConf)renderConferenceDashboard();
  else renderCircle();
}

function renderCircle(){
  const cx=330,cy=330,r=268,n=WHEEL_PRIMES.length;
  let html='<div class="rt-container"><div class="circle-stage">';
  html+=`<button class="invoke-centre" onclick="openModal()">Invoke</button>`;
  WHEEL_PRIMES.forEach((name,i)=>{
    const a=(i/n)*2*Math.PI-Math.PI/2;const x=cx+r*Math.cos(a);const y=cy+r*Math.sin(a);
    const inst=instances[name]||{};const url=inst.chat_url;const stale=isStale(inst.last_seen_at);
    const dn=dName(name);const icon=ICONS[name]||'';
    const resp=invokeTime&&inst.last_seen_at&&new Date(inst.last_seen_at).getTime()>=invokeTime;
    const cls='tile'+(stale?' stale':'')+(resp?' resp-blue':'');
    const inner=`${badges(name)}<img class="tile-icon" src="${icon}" alt="${dn}" style="width:58px;height:58px" onerror="this.style.visibility='hidden'"><span class="tile-name" style="font-size:11px">${dn}</span>`;
    const tag=(url&&!stale)?`a href="${url}" target="_blank" rel="noopener"`:'div';const close=(url&&!stale)?'a':'div';
    html+=`<div class="circle-tile" style="left:${x}px;top:${y}px"><${tag} class="${cls}">${inner}</${close}></div>`;
  });
  html+='</div></div>';
  document.getElementById('rtContent').innerHTML=html;
}

function renderConferenceDashboard(){
  const conf=openConference;
  const date=new Date(conf.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  const invited=conf.invited_lineages||[];
  const respondedSet=new Set(conferenceResponses.filter(r=>r.round===conf.current_round).map(r=>r.posting_lineage));
  let html=`
    <div class="conf-banner">
      <div class="conf-banner-top"><span class="conf-banner-title">${conf.topic}</span><span class="conf-banner-meta">${date}</span></div>
      <div class="conf-banner-body">${(conf.body||'').split('\n').slice(0,4).join('<br>')}</div>
      <div class="conf-banner-round">Round ${conf.current_round} · ${respondedSet.size} of ${invited.length} responded</div>
    </div>
    <div class="conf-responses-head">
      <span class="conf-responses-title">Responses</span>
      <span class="conf-resp-count">${respondedSet.size} of ${invited.length}</span>
    </div>
    <div class="resp-grid">`;
  invited.forEach(name=>{
    const dn=dName(name);const icon=ICONS[name]||'';
    const av=icon?`<div class="resp-avatar"><img src="${icon}" alt="${dn}" onerror="this.parentElement.textContent='${dn[0]}'"></div>`:`<div class="resp-avatar">${dn[0]}</div>`;
    const response=conferenceResponses.find(r=>r.posting_lineage===name&&r.round===conf.current_round);
    if(response){
      const rdate=new Date(response.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      html+=`<div class="resp-card responded" id="rcard-${name}">
        <div class="resp-card-head" onclick="toggleResp('${name}')">
          ${av}<span class="resp-prime-name">${dn}</span><span class="resp-status-dot"></span><span class="resp-expand">▾</span>
        </div>
        <div class="resp-summary">${response.summary||''}</div>
        <div class="resp-body">${(response.body||'').replace(/\n/g,'<br>')}</div>
        <div class="resp-date">${rdate}</div>
      </div>`;
    }else{
      html+=`<div class="resp-card" id="rcard-${name}">
        <div class="resp-card-head">${av}<span class="resp-prime-name">${dn}</span><span class="resp-status-dot"></span><span class="awaiting-pill"><span class="awaiting-dot"></span>awaiting</span></div>
      </div>`;
    }
  });
  html+='</div>';
  document.getElementById('rtContent').innerHTML=html;
}

function toggleResp(name){document.getElementById('rcard-'+name)?.classList.toggle('expanded');}

/* REFRESH STALE PRIME */
async function refreshPrime(name){
  try{
    const res=await fetch(REFRESH_FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY},body:JSON.stringify({name})});
    if(res.ok)await loadData();
  }catch(e){console.error('Refresh failed:',e);}
}

/* CLOSE CONFERENCE */
async function closeConference(){
  if(!openConference)return;
  if(!confirm('Close this conference? All responses are preserved in the database.'))return;
  try{
    const res=await fetch(CLOSE_CONF_FN_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY},
      body:JSON.stringify({conference_id:openConference.id})
    });
    if(!res.ok)throw new Error('Close failed');
    sessionStorage.setItem('rtView','circle');
    await loadData();
  }catch(e){alert('Could not close conference — check console');console.error(e);}
}

function renderMobile(){
  document.getElementById('mobilePrimeList').innerHTML=WHEEL_PRIMES.map(n=>{
    const i=instances[n]||{};const url=i.chat_url;const s=isStale(i.last_seen_at);const dn=dName(n);const icon=ICONS[n]||'';
    const cls='mobile-tile-row'+(s?' stale':'');
    const inner=`<img src="${icon}" alt="${dn}" onerror="this.style.visibility='hidden'"><span class="tile-name">${dn}</span>${badges(n)}`;
    if(url&&!s)return`<a class="${cls}" href="${url}" target="_blank" rel="noopener">${inner}</a>`;
    return`<div class="${cls}">${inner}</div>`;
  }).join('');
}

function renderPrimeGrid(){
  const g=document.getElementById('primeGrid');if(!g)return;
  g.innerHTML=WHEEL_PRIMES.map(n=>{
    const on=checkedPrimes.has(n)?'on':'';const icon=ICONS[n]||'';const dn=dName(n);
    const iconEl=icon?`<div class="p-icon"><img src="${icon}" alt="${dn}" onerror="this.parentElement.textContent='${dn[0]}'"></div>`:`<div class="p-icon">${dn[0]}</div>`;
    return`<div class="p-row ${on}" onclick="togglePrime('${n}')"><div class="p-check"></div>${iconEl}<div class="p-name">${dn}</div></div>`;
  }).join('');
}
function togglePrime(n){if(checkedPrimes.has(n))checkedPrimes.delete(n);else checkedPrimes.add(n);renderPrimeGrid();}
function selectAll(){WHEEL_PRIMES.forEach(n=>checkedPrimes.add(n));renderPrimeGrid();}
function clearAll(){checkedPrimes.clear();renderPrimeGrid();}

function renderNotices(){
  const count=noticesData.length;
  document.getElementById('noticesCount').textContent=count>0?`${count} item${count===1?'':'s'}`:'';
  const b=document.getElementById('noticesBadge');
  if(count>0){b.textContent=count>9?'9+':count;b.style.display='flex';}else b.style.display='none';
  if(count===0){document.getElementById('noticesList').innerHTML='<div class="notices-empty">Nothing requiring attention.</div>';return;}
  document.getElementById('noticesList').innerHTML=noticesData.map((item,idx)=>{
    const dn=item.posting_lineage.charAt(0).toUpperCase()+item.posting_lineage.slice(1);
    const icon=ICONS[item.posting_lineage]||'';
    const av=icon?`<div class="notice-avatar"><img src="${icon}" alt="${dn}" onerror="this.parentElement.textContent='${dn[0]}'"></div>`:`<div class="notice-avatar">${dn[0]}</div>`;
    const date=new Date(item.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    const summary=(item.body||'').split('\n')[0].substring(0,120);
    const lv='level-'+(item.effective_attention_level||'moderate');
    return`<div class="notice-item" id="notice-${idx}"><div class="notice-main">${av}<div class="notice-content"><div class="notice-topic" onclick="toggleNotice(${idx})"><span>${item.topic}</span><span class="expand-arrow">▾</span></div><div class="notice-summary">${summary}</div><div class="notice-body">${(item.body||'').replace(/\n/g,'<br>')}</div></div></div><div class="notice-meta"><div class="notice-prime-name">${dn}</div><div class="notice-date">${date}</div><div class="level-badge ${lv}"><div class="l-dot"></div><div class="l-text">${item.effective_attention_level}</div></div><div class="with-ac">with Antechamber</div><div class="notice-actions"><button class="btn-dismiss" onclick="dismissNotice(${idx},'${item.id}')">Dismiss</button><button class="btn-frag" id="frag-${idx}" onclick="fragNotice(${idx},'${item.id}')">Frag</button></div></div></div>`;
  }).join('');
}
function toggleNotice(i){document.getElementById('notice-'+i).classList.toggle('expanded');}
async function dismissNotice(idx,id){const el=document.getElementById('notice-'+idx);try{await fetch(DISMISS_FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY},body:JSON.stringify({id,action:'dismiss'})});}catch(e){console.warn(e);}el.style.opacity='0';setTimeout(()=>{el.classList.add('dismissed');updateNoticesCount();},300);}
async function fragNotice(idx,id){try{await fetch(DISMISS_FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY},body:JSON.stringify({id,action:'frag'})});}catch(e){console.warn(e);}document.getElementById('notice-'+idx).classList.add('fragged');document.getElementById('frag-'+idx).disabled=true;}
function updateNoticesCount(){const v=document.querySelectorAll('.notice-item:not(.dismissed)').length;document.getElementById('noticesCount').textContent=v>0?`${v} item${v===1?'':'s'}`:'';const b=document.getElementById('noticesBadge');if(v>0){b.textContent=v>9?'9+':v;b.style.display='flex';}else b.style.display='none';if(v===0)document.getElementById('noticesList').innerHTML='<div class="notices-empty">Nothing requiring attention.</div>';}

/* INVOKE MODAL */
function setMode(mode,btn){
  invokeMode=mode;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  const cf=document.getElementById('confFields');
  if(mode==='conference'){
    cf.classList.add('show');
    document.getElementById('invokeMessage').value='Conference called. Read the conference table and post your response to conference_responses directly. No acknowledgement needed.';
  }else{
    cf.classList.remove('show');
    document.getElementById('invokeMessage').value='Conference called. Read the flag and respond if called. Otherwise read if you like and take part only if you see a gap.';
  }
}

function openModal(){
  renderPrimeGrid();
  document.getElementById('modalError').style.display='none';
  // INVOKE FLOW FIX: if open conference exists, pre-select its invited primes and hint
  if(openConference&&openConference.invited_lineages){
    checkedPrimes.clear();
    openConference.invited_lineages.forEach(n=>checkedPrimes.add(n));
    renderPrimeGrid();
    document.getElementById('invokeModalSub').textContent='Conference open — sending to invited Primes';
  }else{
    document.getElementById('invokeModalSub').textContent='Select Primes and send message';
  }
  document.getElementById('invokeModal').style.display='flex';
}
function closeModal(){document.getElementById('invokeModal').style.display='none';}
function handleOverlayClick(e){if(e.target===document.getElementById('invokeModal'))closeModal();}

/* SEND INVOKE — Bug 2 fix + Invoke flow fix */
async function sendInvoke(){
  const msg=document.getElementById('invokeMessage').value.trim();
  const targets=Array.from(checkedPrimes);
  const errEl=document.getElementById('modalError');
  errEl.style.display='none';
  if(!targets.length){errEl.textContent='Select at least one Prime.';errEl.style.display='block';return;}
  if(!msg){errEl.textContent='Please enter a message.';errEl.style.display='block';return;}

  let topic='';
  // INVOKE FLOW FIX: only create conference record if no open conference exists
  const createConference=invokeMode==='conference'&&!openConference;
  if(createConference){
    topic=document.getElementById('confTopic')?.value.trim()||'';
    if(!topic){errEl.textContent='Please enter a conference topic.';errEl.style.display='block';return;}
  }

  const btn=document.getElementById('sendBtn');btn.textContent='Sending…';btn.disabled=true;

  // Open tabs synchronously (must be in click handler)
  targets.forEach(n=>{const url=(instances[n]||{}).chat_url;if(url)window.open(url,'_blank');});
  invokeTime=Date.now();

  // Bug 2 fix: await fetch before closing modal
  try{
    const payload=createConference
      ?{mode:'conference',topic,message:msg,from_lineage:'reg',invited_lineages:targets}
      :{mode:'broadcast',message:msg,from_lineage:'reg',target_lineages:targets};
    const res=await fetch(INVOKE_FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY},body:JSON.stringify(payload)});
    if(!res.ok){
      const d=await res.json().catch(()=>({}));
      errEl.textContent='Send failed: '+(d.error||res.status);
      errEl.style.display='block';
      btn.textContent='Send';btn.disabled=false;
      return;
    }
    // Success: close modal, switch to conference view if appropriate
    closeModal();
    if(invokeMode==='conference')setRtView('conference');
    await loadData();
  }catch(e){
    errEl.textContent='Network error — check console';
    errEl.style.display='block';
    console.error(e);
  }finally{
    btn.textContent='Send';btn.disabled=false;
  }
}

/* ADMIN */
function openAdminPanel(){pendingAdminChanges={};renderAdminBody();document.getElementById('adminPanel').style.display='flex';}
function closeAdminPanel(){document.getElementById('adminPanel').style.display='none';}
function handleAdminOverlay(e){if(e.target===document.getElementById('adminPanel'))closeAdminPanel();}
function renderAdminBody(){
  const cons=projectTiles.filter(t=>t.category==='consultant');const oth=projectTiles.filter(t=>t.category==='other');let html='';
  if(cons.length){html+=`<div class="msg-label" style="margin-bottom:12px">Consultants</div>`;html+=cons.map(t=>`<div class="admin-row"><span class="admin-name">${t.name}</span><input class="admin-input" type="text" value="${t.url||''}" onchange="pendingAdminChanges['${t.id}']={action:'update',id:'${t.id}',url:this.value}"></div>`).join('');}
  if(oth.length){html+=`<div class="msg-label" style="margin:18px 0 12px">Others</div>`;html+=oth.map(t=>`<div class="admin-row"><span class="admin-name">${t.name}</span><input class="admin-input" type="text" value="${t.url||''}" onchange="pendingAdminChanges['${t.id}']={action:'update',id:'${t.id}',url:this.value}"></div>`).join('');}
  html+=`<div class="msg-label" style="margin:20px 0 12px;border-top:1px solid var(--border-lt);padding-top:18px">Add new Other tile</div><div class="admin-row" style="margin-bottom:8px"><span class="admin-name">Name</span><input class="admin-input" type="text" id="newTileName" placeholder="e.g. TripBuddy"></div><div class="admin-row"><span class="admin-name">URL</span><input class="admin-input" type="text" id="newTileUrl" placeholder="https://claude.ai/chat/…"></div>`;
  document.getElementById('adminBody').innerHTML=html;
}
async function saveAdmin(){
  const btn=document.getElementById('adminSaveBtn');btn.textContent='Saving…';btn.disabled=true;
  try{
    for(const c of Object.values(pendingAdminChanges)){await fetch(TILES_ADMIN_FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY},body:JSON.stringify(c)});}
    const nn=document.getElementById('newTileName')?.value.trim();const nu=document.getElementById('newTileUrl')?.value.trim();
    if(nn&&nu)await fetch(TILES_ADMIN_FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY},body:JSON.stringify({action:'insert',name:nn,url:nu,category:'other'})});
    closeAdminPanel();await loadData();
  }catch(e){console.error(e);alert('Save failed');}
  finally{btn.textContent='Save changes';btn.disabled=false;}
}

function showPage(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active');btn.classList.add('active');}
document.addEventListener('DOMContentLoaded',loadData);
</script>
